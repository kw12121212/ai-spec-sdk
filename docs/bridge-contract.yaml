# Bridge Contract
# ai-spec-sdk JSON-RPC 2.0 integration contract.

contract:
  name: ai-spec-sdk bridge
  protocol: jsonrpc-2.0
  bridgeVersion: "0.2.0"
  apiVersion: "0.2.0"
  source_of_truth:
    dispatch: src/bridge.ts
    capabilities: src/capabilities.ts
    auth_scopes: src/auth.ts

transport:
  stdio:
    protocol: jsonrpc-2.0
    medium: stdio
    framing: newline-delimited JSON objects
    encoding: UTF-8
    client_to_bridge: one request object per line on stdin
    bridge_to_client: one response or notification object per line on stdout
  http:
    protocol: jsonrpc-2.0
    medium: HTTP/1.1
    encoding: UTF-8
    endpoints:
      POST /rpc:
        description: Send one JSON-RPC request and receive one JSON-RPC response.
        content_type: application/json
        body_limit: 10 MB
        auth: bearer token unless started with --no-auth
      GET /events:
        description: Server-sent event stream for notifications scoped by sessionId.
        query:
          sessionId: required string
        content_type: text/event-stream
      GET /health:
        description: Unauthenticated health check.
        response:
          status: ok
          apiVersion: string
  websocket:
    protocol: jsonrpc-2.0
    medium: WebSocket
    endpoint: /ws
    description: Bidirectional JSON-RPC transport for request/response and session-scoped notifications.

startup:
  stdio:
    command: node dist/src/cli.js
  http:
    command: node dist/src/cli.js --transport http --port 8765
  websocket:
    command: node dist/src/cli.js --transport ws --port 8765

environment:
  AI_SPEC_SDK_TRANSPORT:
    type: string
    required: false
    enum: [stdio, http, ws]
    default: stdio
  AI_SPEC_SDK_PORT:
    type: string
    required: false
    default: "8765"
  AI_SPEC_SDK_CORS_ORIGINS:
    type: string
    required: false
    default: "*"
  AI_SPEC_SDK_UI_ENABLED:
    type: string
    required: false
    default: "true"
  AI_SPEC_SDK_LOG_LEVEL:
    type: string
    required: false
    enum: [debug, info, warn, error, silent]
  AI_SPEC_SDK_LOG_FILE:
    type: string
    required: false
  SPEC_DRIVEN_SCRIPT:
    type: string
    required: false
    description: Absolute path override for the spec-driven workflow script.
  ANTHROPIC_API_KEY:
    type: string
    required: false
    description: Optional live Anthropic provider credential.
  ANTHROPIC_AUTH_TOKEN:
    type: string
    required: false
    description: Optional live Anthropic provider auth token.
  ANTHROPIC_BASE_URL:
    type: string
    required: false
    description: Optional Anthropic API base URL override.
  OPENAI_API_KEY:
    type: string
    required: false
    description: Optional live OpenAI provider credential.
  DEEPSEEK_API_KEY:
    type: string
    required: false
    description: Optional live DeepSeek provider credential.
  LLM_CACHE_DIR:
    type: string
    required: false
    description: Optional provider registry cache directory.
  AI_SPEC_MASTER_KEY:
    type: string
    required: false
    description: Required only when using encrypted secret vault helpers.

envelope:
  request:
    jsonrpc: "2.0"
    id: string | number | null
    method: string
    params: object
  response:
    jsonrpc: "2.0"
    id: string | number | null
    result: object | array | string | number | boolean | null
    error:
      code: number
      message: string
      data: object
  notification:
    jsonrpc: "2.0"
    method: string
    params: object

notifications:
  bridge/progress:
    description: Workflow progress notification.
    params:
      requestId: string | number | null
      phase: string
      workflow: string
      workspace: string
  bridge/session_event:
    description: Session lifecycle, agent message, and stream event notification.
    params:
      requestId: string | number | null
      sessionId: string
      type: string
  bridge/subagent_event:
    description: Derived subagent event notification emitted from session events.
    params:
      requestId: string | number | null
      sessionId: string
      type: string
  bridge/hook_triggered:
    description: Hook execution notification.
  bridge/file_changed:
    description: File change notification emitted by hook and context workflows.
  bridge/tool_approval_requested:
    description: Tool approval request notification for approval-mode sessions.

error_codes:
  -32700:
    name: ParseError
    message: Parse error
  -32600:
    name: InvalidRequest
    message: Invalid JSON-RPC request
  -32601:
    name: MethodNotFound
    message: "Method not found: <method>"
  -32602:
    name: InvalidParams
    message: Parameter validation failed
  -32603:
    name: InternalError
    message: Internal bridge error
  -32001:
    name: WorkspaceOrProviderNotFound
    message: Requested workspace or provider was not found
  -32002:
    name: ScriptOrDuplicateId
    message: Spec workflow script missing or duplicate identifier
  -32003:
    name: WorkflowFailed
    message: Workflow execution failed
  -32005:
    name: BalancerAllExcluded
    message: All providers were excluded from load-balancer selection
  -32011:
    name: SessionNotFound
    message: Session not found
  -32012:
    name: SDKSessionIdUnavailable
    message: Session SDK ID not available
  -32020:
    name: ApprovalNotFound
    message: Approval request not found
  -32021:
    name: TemplateNotFound
    message: Template not found
  -32031:
    name: TeamNotFound
    message: Team not found
  -32050:
    name: VersionMismatch
    message: Unsupported API version or no compatible API version found
  -32060:
    name: InsufficientScope
    message: "Insufficient scope: requires <scope>"
  -32061:
    name: AuthRequired
    message: Authentication required or invalid API key
  -32070:
    name: SessionActive
    message: Cannot delete an active session
  -32072:
    name: BudgetNotFound
    message: Budget not found
  -32073:
    name: BudgetExhausted
    message: Budget exhausted


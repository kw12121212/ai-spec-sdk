summary: Provide official Python Client SDK via PyPI
details: >-
  Create `clients/python/` containing a fully typed Python SDK. Implement both `StdioTransport` 
  (subprocess sync/async) and `HttpTransport` (httpx with SSE support). Auto-map or manually  define
  the JSON-RPC contract methods to allow Python developers to programmatically spawn and  interact
  with the bridge.

planned_change:
  id: default-tools
  milestone: 0017-lightweight-cli
status: planned
summary: Built-in file read/write and shell execution tools
details: >-
  Provide an out-of-the-box experience by bundling core code-editing tools directly. 1. Create a
  built-in filesystem and shell execution tool provider within the TypeScript bridge. 2. Implement
  tools: `read_file`, `write_file`, `replace` (for targeted edits), `list_directory`, and
  `run_shell_command`. 3. The Go CLI should automatically enable these built-in tools by default. 4.
  Ensure `run_shell_command` and file mutations are tightly integrated with the existing tool
  approval flow for safety.
depends_on: []

schema: strict-spec-driven/planned-change/v1
schema_version: 1
artifact_type: planned_change
schema_file: ../../templates/strict-spec-driven/schemas/planned-change.yaml
planned_change:
  id: cli-command-matrix-e2e
  milestone: 0020-cli-real-e2e-validation
status: complete
summary: Cover the non-LLM CLI command matrix with real compiled processes
details: >-
  Add deterministic real-process E2E coverage for every non-LLM command surface in `src/cli.ts`. The
  matrix should verify `--help` and `-h`, `doctor` text and `doctor --json`, doctor transport flags
  and invalid port errors, `keygen` with name/scopes/roles/expires, `keys list`, successful and
  failed `keys revoke`, default stdio JSON-RPC bridge mode including `bridge.capabilities` and
  parse-error handling, HTTP/SSE transport startup on an isolated port with and without auth,
  WebSocket transport startup if `--transport ws` remains accepted by the CLI, basic
  health/capability requests, unknown `keys` subcommands, and clean shutdown on SIGTERM. Assertions
  should inspect real stdout/stderr, exit codes, JSON schema shape, generated key store contents
  under the temporary HOME, and absence of writes outside the test root.
depends_on:
  - cli-real-process-e2e-harness

schema: strict-spec-driven/planned-change/v1
schema_version: 1
artifact_type: planned_change
schema_file: ../../templates/strict-spec-driven/schemas/planned-change.yaml
planned_change:
  id: agent-sdk-option-forwarding
  milestone: 0019-coding-agent-cli-hardening
status: planned
summary: Preserve workspace-scoped Claude Agent SDK controls on Anthropic provider-routed sessions
details: >-
  Ensure the production Anthropic provider path keeps using the Claude Agent SDK as a coding-agent
  runtime and forwards the same session controls as the direct SDK path: cwd, env, tools,
  permissionMode, allowedTools, disallowedTools, resume, maxTurns, systemPrompt, stream settings,
  and provider model/API-key configuration. Also map Anthropic-compatible third-party provider
  settings such as baseUrl/baseURL/apiBaseUrl, authToken, and provider env into Claude Agent SDK
  environment variables including ANTHROPIC_BASE_URL, ANTHROPIC_API_KEY, and ANTHROPIC_AUTH_TOKEN.
depends_on:
  - agent-session-sdk-wiring
  - provider-switching

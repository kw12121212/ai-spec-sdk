schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: bridge-extensibility
  status: complete
summary:
  what:
    - >-
      Extend the bridge protocol with three core extensibility mechanisms: MCP server management
      (workspace-scoped lifecycle), configuration/settings management (read/write with scope
      awareness), and a hooks system (event-driven automation with dedicated methods). These are the
      three highest-impact gaps between the current SDK and a complete Claude Code CLI integration
      surface.
  why:
    - >-
      External tools building on this SDK cannot currently configure MCP servers, manage settings,
      or set up automation hooks — all of which are essential capabilities in Claude Code. Without
      these, consumers are limited to basic session management and cannot replicate the full CLI
      experience. These three features together cover the core extensibility story:
    - '**MCP servers** let tools extend Claude''s capabilities with custom tools and data sources'
    - >-
      **Configuration management** lets tools read and persist user preferences, permissions, and
      environment settings
    - '**Hooks** let tools automate workflows around tool use, session lifecycle, and notifications'
scope:
  in: []
  out: []
unchanged_behavior:
  - Existing JSON-RPC 2.0 protocol structure and error codes remain unchanged
  - >-
    All existing bridge methods (`session.start`, `session.resume`, `session.stop`, `session.list`,
    `session.history`, `session.events`, `bridge.capabilities`, `bridge.ping`, `models.list`,
    `tools.list`, `workspace.register`, `workspace.list`, `workflow.run`, `skills.list`,
    `session.approveTool`, `session.rejectTool`) continue to work identically
  - Session persistence format and location are unchanged
  - >-
    Agent control parameters (`model`, `allowedTools`, `disallowedTools`, `permissionMode`,
    `maxTurns`, `systemPrompt`) are unchanged
  - Tool approval flow is unchanged
  - Event buffer behavior (in-memory, 500 cap, sequence numbers) is unchanged
  - Native build output is unchanged

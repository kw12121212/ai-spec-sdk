schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: proposal-response-correlation
  status: complete
summary:
  what:
    - >-
      Implement the capability to match incoming asynchronous human responses to specific pending
      questions emitted by paused agent sessions.
  why:
    - >-
      Agents can now pause execution and emit questions to human operators (`question-payload`)
      through various channels (`multi-channel-delivery`). To resume these sessions, the bridge must
      accept the response, correlate it with the waiting session, and provide it to the agent upon
      resumption.
scope:
  in: []
  out: []
unchanged_behavior:
  - The structure of the emitted question payload remains identical.
  - Webhook delivery mechanism for outgoing questions remains unchanged.

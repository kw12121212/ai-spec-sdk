change: escalation-gate
approach:
  - >-
    Use the existing delivery tracking and question payload mechanisms to flag loop states as
    'escalated', pausing the autonomous loop until human input resolves the state
decisions:
  decision-use-question-resolution:
    decision: Re-use the question resolution protocol for human escalation
    rationale: >-
      Avoids building a parallel system for human intervention and leverages existing delivery
      tracking

schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: hooks-hook-execution
mapping:
  implementation: []
  tests: []
operations:
  ADDED:
    Hook Execution Audit Trail:
      strength: MUST
      statement: >-
        In addition to emitting `bridge/hook_triggered` notifications, the bridge MUST write a
        `hook_execution` audit entry via the `AuditLog` instance for every hook command execution.
        The audit entry MUST be written regardless of whether the hook is blocking or non-blocking.
        For blocking hooks, the entry is written after the command completes (with final exitCode,
        stdout, stderr, durationMs). For non-blocking hooks, two entries are written: one immediate
        entry with pending values (exitCode null, durationMs null) and one completion entry with
        final values. The audit entry payload MUST include all fields from the
        `bridge/hook_triggered` notification plus the `hookId` and `matcher` if available.
      scenarios:
        hook-audit-entry-mirrors-hooktriggered-notification:
          - GIVEN: a pre_tool_use hook executes and exits with code 0
          - WHEN: the hook completes
          - THEN: >-
              both a bridge/hook_triggered notification AND a hook_execution audit entry are
              produced
          - AND: both contain matching exitCode, durationMs, and command values
        non-blocking-hook-produces-two-audit-entries:
          - GIVEN: a post_tool_use hook (non-blocking) is triggered
          - WHEN: the event fires
          - THEN: an audit entry with exitCode null is written immediately
          - AND: a second audit entry with final exitCode is written when the hook process exits
  MODIFIED: {}
  REMOVED: {}

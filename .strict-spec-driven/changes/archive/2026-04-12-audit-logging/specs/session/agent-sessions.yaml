schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: session-agent-sessions
mapping:
  implementation: []
  tests: []
operations:
  ADDED:
    Session Store Audit Integration:
      strength: MUST
      statement: >-
        The `SessionStore` MUST accept an `AuditLog` instance via its constructor and use it to
        write audit entries for state transitions. When `transitionExecutionState` is called and the
        state machine transition succeeds, the `SessionStore` MUST additionally write a
        `state_transition` audit entry through the `AuditLog` instance (if provided). If no
        `AuditLog` instance is provided, state transitions MUST still function normally without
        audit entries. When `create` is called and a new session is initialized, the `SessionStore`
        MUST write a `session_created` audit entry through the `AuditLog` instance (if provided).
      scenarios:
        sessionstore-writes-audit-on-state-transition:
          - GIVEN: a SessionStore is constructed with an AuditLog instance
          - AND: a session is created
          - WHEN: transitionExecutionState moves the session from "idle" to "running"
          - THEN: the AuditLog receives a write call with eventType "state_transition"
        sessionstore-works-without-auditlog:
          - GIVEN: a SessionStore is constructed without an AuditLog instance
          - WHEN: a session is created and transitions states
          - THEN: operations succeed normally and no error is thrown
        sessionstore-writes-audit-on-create:
          - GIVEN: a SessionStore is constructed with an AuditLog instance
          - WHEN: create() is called with a workspace and prompt
          - THEN: the AuditLog receives a write call with eventType "session_created"
  MODIFIED: {}
  REMOVED: {}

schema: strict-spec-driven/task-list/v2
schema_version: 2
artifact_type: task_list
schema_file: templates/strict-spec-driven/schemas/task-list.yaml
change: audit-logging
sections:
  Implementation:
    implementation-1:
      text: >-
        Create `src/audit-log.ts` with `AuditEntry` interface, `AuditLog` class (constructor
        accepting `auditDir` and `notify` callback), `write(entry)` method (append JSONL + emit
        notification), and `query(filters)` method (read/filter/paginate audit files)
      status: complete
    implementation-2:
      text: >-
        Add `auditDir` parameter to `BridgeServerOptions` and construct `AuditLog` instance in
        `BridgeServer` constructor, defaulting to `<sessionsDir>/audit/`
      status: complete
    implementation-3:
      text: >-
        Wire `AuditLog` into `SessionStore` constructor — accept optional `AuditLog`, write
        `session_created` entries in `create()`, write `state_transition` entries in
        `transitionExecutionState()` via `AgentStateMachine.onTransition` listener
      status: complete
    implementation-4:
      text: >-
        Add audit entry writes in `_runQuery` for `tool_use` content blocks (with SHA-256 input
        hash) and `tool_result` content blocks (with status and duration)
      status: complete
    implementation-5:
      text: >-
        Add audit entry writes in hook execution path in `bridge.ts` — write `hook_execution` entry
        alongside existing `bridge/hook_triggered` notification emission
      status: complete
    implementation-6:
      text: >-
        Add lifecycle audit entries in `startSession`, `resumeSession`, `stopSession`,
        `spawnSession`, `branchSession` methods after each operation completes
      status: complete
    implementation-7:
      text: >-
        Implement `audit.query` JSON-RPC method handler in `BridgeServer` with filter parsing, file
        reading, and paginated response
      status: complete
    implementation-8:
      text: >-
        Implement audit retention cleanup on bridge startup — scan audit dir, remove expired files
        for non-active sessions, respect `AI_SPEC_SDK_AUDIT_RETENTION_DAYS` env var (default 30)
      status: complete
    implementation-9:
      text: Export `AuditLog` and `AuditEntry` types from `src/index.ts`
      status: complete
  Testing:
    testing-1:
      text: Run `bun run lint` (tsc --noEmit) and confirm no type errors
      status: complete
      command: bun run lint
    testing-2:
      text: >-
        Create `test/audit-log.test.ts` — unit tests for `AuditLog` class: write creates/appends
        JSONL file, query filters by sessionId/category/eventType/time range, query applies limit
        correctly, query returns empty for unknown session, query without sessionId scans all,
        invalid filters handled gracefully
      status: complete
      command: test/audit-log.test.ts
    testing-3:
      text: >-
        Create `test/session-store-audit.test.ts` — tests that `SessionStore` writes audit entries
        on create and state transition when AuditLog is provided, works normally when AuditLog is
        absent
      status: complete
      command: test/session-store-audit.test.ts
    testing-4:
      text: >-
        Create `test/bridge-audit.test.ts` — integration tests for `audit.query` method via
        BridgeServer: filtered queries return correct entries, limit enforcement, time range
        filtering, unknown session returns empty
      status: complete
      command: test/bridge-audit.test.ts
    testing-5:
      text: >-
        Create `test/hook-audit.test.ts` — tests that hook execution produces audit entries matching
        hook_triggered notification data, non-blocking hooks produce pending + completion entries
      status: complete
      command: test/hook-audit.test.ts
    testing-6:
      text: Verify all new tests pass with `bun run test`
      status: complete
      command: bun run test
  Verification:
    verification-1:
      text: Verify all delta spec requirements have corresponding test scenarios
      status: complete
    verification-2:
      text: Verify `audit.query` method is registered in the bridge method dispatch table
      status: complete
    verification-3:
      text: Verify `bridge/audit_event` notifications are emitted for all audited event types
      status: complete
    verification-4:
      text: Verify existing session/hook/tool methods still work unchanged (regression check)
      status: complete
    verification-5:
      text: Verify audit files are created in correct directory structure
      status: complete
    verification-6:
      text: Verify retention cleanup removes only eligible files
      status: complete
testing_gates:
  validation_task: testing-1
  unit_test_task: testing-2

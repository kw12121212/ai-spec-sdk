schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: proposal-websocket-transport
  status: complete
summary:
  what:
    - >-
      Implement bidirectional WebSocket transport with JSON-RPC 2.0 framing, ping/pong keepalive,
      and session-scoped event subscriptions.
  why:
    - >-
      Real-time bidirectional communication is foundational for Advanced Runtime features, such as
      multi-agent orchestration, and provides a lower latency, unified connection for both RPC
      requests and event streams compared to HTTP/SSE.
scope:
  in: []
  out: []
unchanged_behavior:
  - Existing `stdio` and `http` (`/rpc`, `/events`) transports remain unchanged and functional.
  - The core JSON-RPC 2.0 message format and existing method signatures remain unchanged.

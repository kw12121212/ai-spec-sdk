schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: add-helper-scripts
  status: complete
summary:
  what:
    - >-
      Create a `scripts/` directory containing bash helper scripts for common development
      operations: building, testing, linting, cleaning, and running all checks.
  why:
    - >-
      Currently all dev commands must be run via `bun run <script>` from package.json. Helper
      scripts provide:
    - Single-command access without remembering `bun run` prefixes
    - Composable workflows (e.g., clean + build + test in one step)
    - Consistent entry points for CI and local development
scope:
  in: []
  out: []
unchanged_behavior:
  - All existing `bun run` scripts in package.json continue to work identically
  - Build output path (`dist/`) remains unchanged
  - Test runner behavior (bun test) remains unchanged
  - Native build (`build:native`) remains unchanged

schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: add-helper-scripts
approach:
  - >-
    Create standalone bash scripts in `scripts/` that wrap existing `bun run` commands from
    package.json. Each script:
  - Uses `set -euo pipefail` for strict error handling
  - Detects the project root via script location (`scripts/` is always at project root)
  - Delegates to `bun run` commands already defined in package.json
  - Prints a summary line on completion
decisions:
  '1':
    decision: '1.'
    rationale: >-
      **Scripts delegate to `bun run`** rather than duplicating commands — keeps build logic in
      package.json as single source of truth 2. **No shebang `#!/usr/bin/env bash`** — these are
      sourced or run explicitly, not installed to PATH 3. **Minimal output** — scripts print only
      what's needed (errors + a done line), letting the underlying tools produce their own output
alternatives:
  - option: Makefile
    reason: More powerful but adds a build tool dependency; overkill for 4 simple scripts
  - option: Just (command runner)
    reason: Same issue — adds a dependency for trivial wrapping
  - option: Adding scripts to package.json only
    reason: Already done; bash scripts provide direct CLI access

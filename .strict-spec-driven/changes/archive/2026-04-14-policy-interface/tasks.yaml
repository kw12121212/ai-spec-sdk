schema: strict-spec-driven/task-list/v2
schema_version: 2
artifact_type: task_list
schema_file: templates/strict-spec-driven/schemas/task-list.yaml
change: policy-interface
sections:
  Implementation:
    implementation-1:
      text: >-
        Create `src/permission-policy.ts` with `PolicyResult` type (`allow` | `deny` | `pass`),
        `PolicyContext` interface (toolName, toolInput, sessionId), `PermissionPolicy` interface
        (async `check()`), `PolicyDescriptor` type (name + optional config), and `PolicyChain` class
        (ordered execution, deny/allow short-circuit)
      status: complete
    implementation-2:
      text: >-
        Create a built-in policy registry in `src/permission-policy.ts` with `registerPolicy(name,
        factory)` and `resolvePolicies(descriptors)` functions
      status: complete
    implementation-3:
      text: Add `policies` field to session data in `src/session-store.ts`
      status: complete
    implementation-4:
      text: >-
        Add `policies` parameter validation in `bridge.ts` `validateAgentControlParams()` — reject
        unknown policy names with `-32602`
      status: complete
    implementation-5:
      text: Wire `policies` into `session.start`, `session.spawn`, `session.resume` in `bridge.ts`
      status: complete
    implementation-6:
      text: >-
        Insert `PolicyChain.run()` call in `bridge.ts` tool_use handler before the existing
        `isScopeDenied` check (around line 1249)
      status: complete
    implementation-7:
      text: Emit `bridge/policy_denied` notification and write `policy_decision` audit entries on deny
      status: complete
    implementation-8:
      text: Implement `permissions.policies.list` JSON-RPC method in `bridge.ts`
      status: complete
    implementation-9:
      text: Export new types and functions from `src/index.ts`
      status: complete
  Testing:
    testing-1:
      text: 'Lint: run `bun run typecheck` — must pass with no errors'
      status: complete
      command: bun run typecheck
    testing-2:
      text: 'Unit tests: run `bun test` — all existing and new tests must pass'
      status: complete
      command: bun test
    testing-3:
      text: >-
        Create `test/permission-policy.test.ts` covering: PolicyChain deny short-circuit, allow
        short-circuit, all-pass fallthrough, unknown policy rejection, audit logging, notification
        emission, execution order relative to scope check
      status: complete
      command: test/permission-policy.test.ts
  Verification:
    verification-1:
      text: Verify policy chain executes before scope check and before pre_tool_use hooks
      status: complete
    verification-2:
      text: Verify sessions without policies behave identically to before (no regression)
      status: complete
    verification-3:
      text: Verify `permissions.policies.list` returns correct policy descriptors for a session
      status: complete
    verification-4:
      text: Verify unknown policy name in session.start/session.spawn/session.resume returns `-32602`
      status: complete
testing_gates:
  validation_task: testing-1
  unit_test_task: testing-2

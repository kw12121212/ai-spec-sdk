schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: proposal-mcp-adapter
  status: complete
summary:
  what:
    - >-
      Implement an adapter for the Model Context Protocol (MCP) to allow the AI Spec SDK to
      communicate with external MCP servers. The SDK will manage the lifecycle of these servers and
      provide a standardized interface to invoke tools exposed by them.
  why:
    - >-
      This is a core requirement of Milestone 11. It allows AI agents to interact with external
      tools and data sources that conform to the MCP standard, significantly expanding the
      capabilities of the system beyond built-in or custom JSON-RPC tools.
scope:
  in: []
  out: []
unchanged_behavior:
  - The existing JSON-RPC bridge protocol remains unchanged.
  - >-
    The `McpStore` lifecycle management (start/stop/list) remains intact but will be extended to
    support actual protocol interactions.
  - The LSP integration is untouched.

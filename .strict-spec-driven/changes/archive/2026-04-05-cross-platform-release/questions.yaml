schema: strict-spec-driven/question-list/v1
schema_version: 1
artifact_type: question_list
schema_file: templates/strict-spec-driven/schemas/question-list.yaml
change: cross-platform-release
open: []
resolved:
  - id: does-the-python-client-sdk-source-already-exist-or-does-build-pack-only-produce-a-stub
    question: Does the Python client SDK source already exist, or does `build:pack` only produce a stub?
    context: >-
      The roadmap mentions `python -m build` but the spec for python-client-sdk exists without a
      corresponding archived change.
    answer: >-
      Confirmed at scaffold time — `clients/python/` exists with `pyproject.toml` (hatchling
      backend) and `src/` directory. Both clients are implemented. Pack scripts wire the existing
      sources.
    status: resolved
  - id: is-ci-the-primary-delivery-path-or-should-scripts-run-locally-on-a-single-platform
    question: Is CI the primary delivery path, or should scripts run locally on a single platform?
    context: >-
      Multi-platform bun compile is most reliable on a matching CI runner, but the roadmap notes say
      "local packaging, manual copy."
    answer: >-
      Local-only per roadmap notes. Scripts run on the developer's machine. `bun compile --target`
      cross-compilation handles the binary generation without requiring platform-specific runners.
    status: resolved
  - id: should-windows-exe-extension-be-handled-explicitly-in-scripts
    question: Should Windows `.exe` extension be handled explicitly in scripts?
    context: >-
      `bun compile` adds `.exe` automatically on Windows but not when cross-compiling for Windows
      from another OS.
    answer: >-
      Windows target output is named `dist/ai-spec-bridge-windows-x64.exe` explicitly in the
      `--outfile` flag so the name is consistent regardless of host platform.
    status: resolved

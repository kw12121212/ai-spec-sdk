schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: build-native-executable
mapping:
  implementation: []
  tests: []
operations:
  ADDED:
    per-platform build scripts exist:
      strength: MUST
      statement: >-
        The project MUST expose `build:native:linux-x64`, `build:native:linux-arm64`,
        `build:native:macos-x64`, `build:native:macos-arm64`, and `build:native:windows-x64` scripts
        in `package.json`.
      scenarios: {}
    per-platform scripts produce correctly named binaries:
      strength: MUST
      statement: >-
        Each `build:native:<target>` script MUST produce a self-contained executable at
        `dist/ai-spec-bridge-<target>`. The Windows target MUST produce
        `dist/ai-spec-bridge-windows-x64.exe`.
      scenarios: {}
    build:native:all script compiles all five targets:
      strength: MUST
      statement: >-
        The project MUST expose a `build:native:all` script that compiles all five platform targets
        and generates a SHA-256 checksum file (`<binary>.sha256`) alongside each binary.
      scenarios: {}
    checksum files are generated for all native binaries:
      strength: MUST
      statement: >-
        Running `build:native:all` MUST produce one `.sha256` file per binary, named
        `<binary-filename>.sha256`, containing the hex digest of that binary.
      scenarios: {}
    existing build:native script is unchanged:
      strength: MUST
      statement: >-
        The existing `build:native` script (no target flag, output at `dist/ai-spec-bridge-native`)
        MUST remain present and unchanged.
      scenarios: {}
  MODIFIED: {}
  REMOVED: {}

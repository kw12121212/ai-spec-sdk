schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: context-lifecycle-manager
approach:
  - >-
    Monitor session token usage during loop execution. When approaching the token limit threshold,
    pause the loop, persist the exact execution state and necessary context, and spawn a new session
    with the restored state.
decisions:
  token-threshold:
    decision: Configurable token warning threshold
    rationale: >-
      Allows administrators to tune when a session restart should occur based on the LLM provider's
      specific context window.
alternatives: []
risks: []

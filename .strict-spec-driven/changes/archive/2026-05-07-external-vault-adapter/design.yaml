change: external-vault-adapter
approach:
  - >-
    Create an ExternalVaultAdapter interface that implements SecretStorage (or StorageBackend) to
    interface with AWS Secrets Manager and HashiCorp Vault.
decisions:
  vault-interface:
    decision: Create a generic VaultAdapter interface for external providers
    rationale: Allows swapping external providers without changing the core application logic

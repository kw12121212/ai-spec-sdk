schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: persistence-secret-versioning
mapping:
  implementation:
    - src/storage/secret-versioning.ts
  tests:
    - test/storage/secret-versioning.test.ts
operations:
  ADDED:
    secret-version-history:
      strength: MUST
      statement: >-
        The system MUST allow storing multiple versions of a secret under the same identifier and
        track which version is active.
      scenarios:
        version-creation:
          - GIVEN: A secret exists with version 1
          - WHEN: A new value is saved for the secret
          - THEN: The system creates version 2 and marks it as active
  MODIFIED: {}
  REMOVED: {}

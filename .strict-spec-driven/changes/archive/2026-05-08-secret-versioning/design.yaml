schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: secret-versioning
approach:
  - >-
    Extend the existing secret storage mechanism to support versions. Secrets will be keyed by ID
    and version. A metadata record will track the 'active' version.
decisions:
  use-metadata-record:
    decision: Use a metadata record to track active versions
    rationale: Allows atomic switching of the active secret version and provides a clear history.
alternatives: []
risks: []

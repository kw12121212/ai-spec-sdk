schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: proposal-token-attribution
approach:
  - >-
    The token recording data model (`TokenRecord`) will be extended (if not already fully leveraged)
    to reliably capture and expose a `messageId` field. The `claude-agent-runner` or equivalent
    orchestration layer will ensure that when an LLM message or query resolves, its generated
    `messageId` (either from the provider or self-generated for tracing) is logged alongside the
    tokens.
decisions:
  the-messageid-should-be-the-unique-identifier-provided-by:
    decision: >-
      The `messageId` should be the unique identifier provided by the downstream client or the LLM
      provider for a specific message turn.
    rationale: If one is not natively provided by the event, the runner should synthesize a trace ID.
  the-retrieval-function-token-getmessageusage-will-filter:
    decision: >-
      The retrieval function `token.getMessageUsage` will filter `TokenStore` records directly by
      `messageId`.
    rationale: >-
      The retrieval function `token.getMessageUsage` will filter `TokenStore` records directly by
      `messageId`.
alternatives:
  - option: >-
      Creating a separate nested structure mapping `sessionId -> messageId -> usage` was considered,
      but keeping `TokenRecord` flat with `sessionId` and `messageId` columns reduces query
      complexity and simplifies the storage model.
    reason: >-

      status: complete
    implementation-3:
      text: Implement `bridge.negotiateVersion` dispatch case in `src/bridge.ts`
      status: complete
    implementation-4:
      text: >-
        Add per-request version validation in `dispatch()` — check `params.apiVersion` before method
        switch, throw `-32050` on mismatch
      status: complete
    implementation-5:
      text: Add `bridge.negotiateVersion` to capabilities methods list
      status: complete
    implementation-6:
      text: >-
        Update `docs/bridge-contract.yaml` with new method, `apiVersion` field, and error code
        `-32050`
      status: complete
  Testing:
    testing-1:
      text: Lint passes (`bun run lint`)

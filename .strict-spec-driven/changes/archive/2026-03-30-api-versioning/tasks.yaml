      command: bun run lint
    testing-2:
      text: 'Unit test: `bridge.capabilities` response includes `apiVersion`'
      status: complete
      command: bridge.capabilities
    testing-3:
      text: 'Unit test: `bridge.negotiateVersion` returns `{negotiatedVersion, capabilities}` on match'
      status: complete
      command: bridge.negotiateVersion

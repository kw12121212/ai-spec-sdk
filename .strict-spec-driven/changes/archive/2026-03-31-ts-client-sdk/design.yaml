schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: proposal-ts-client-sdk
approach:
  - 'Create `packages/client/` as a standalone npm package. The client is structured in three layers:'
  - >-
    **Types** (`types.ts`) — hand-written TypeScript interfaces for every bridge method's params and
    result shapes, derived from `docs/bridge-contract.yaml`
  - >-
    **Transport** (`transport.ts`, `stdio-transport.ts`, `http-transport.ts`) — abstract `Transport`
    interface with two implementations: `StdioTransport`: spawns bridge as subprocess, writes
    JSON-RPC requests to stdin, reads responses and notifications from stdout, matches by request id
    `HttpTransport`: sends requests via `POST /rpc`, subscribes to events via `GET /events` SSE,
    handles reconnection with exponential backoff
  - >-
    **Client** (`client.ts`) — `BridgeClient` class that holds a transport instance, exposes typed
    methods for each bridge method, and emits notifications via an EventEmitter pattern ```
    packages/client/ ├── package.json ├── tsconfig.json ├── src/ │ ├── index.ts # Public API
    re-exports │ ├── types.ts # All typed interfaces │ ├── errors.ts # BridgeClientError │ ├──
    transport.ts # Transport interface │ ├── stdio-transport.ts # StdioTransport impl │ ├──
    http-transport.ts # HttpTransport impl │ └── client.ts # BridgeClient class └── test/ ├──
    stdio-transport.test.ts ├── http-transport.test.ts ├── client.test.ts └── integration.test.ts
    ```
decisions:
  standalone-package-keeps-bridge-core-dependency-free-client:
    decision: '**Standalone package** — keeps bridge core dependency-free; client is opt-in.'
    rationale: Not part of the root workspace to avoid coupling build processes.
  hand-written-types-over-code-generation:
    decision: '**Hand-written types over code generation**'
    rationale: >-
      the bridge contract is stable and small enough that hand-written types are simpler and more
      maintainable than a code generator.
  eventemitter-pattern-for-notifications-client-on:
    decision: >-
      **EventEmitter pattern for notifications** — `client.on('session_event', handler)` is
      idiomatic Node.js.
    rationale: Avoids callback soup and supports multiple listeners.
  zero-external-deps-uses-node-js-built-in-fetch-eventsource:
    decision: >-
      **Zero external deps** — uses Node.js built-in `fetch`, `EventSource` (available since Node
      20), and `child_process`.
    rationale: No axios, no eventsource polyfill.
  reconnection-in-httptransport-only-stdio-is-a-local:
    decision: >-
      **Reconnection in HttpTransport only** — stdio is a local subprocess; reconnection doesn't
      apply.
    rationale: HTTP transport reconnects SSE with exponential backoff (1s, 2s, 4s, ..., 30s cap).
alternatives:
  - option: '**Callback-based notification API**'
    reason: >-
      rejected in favor of EventEmitter; less flexible, doesn't support multiple listeners
      naturally.
  - option: '**Axios for HTTP**'
    reason: rejected to keep zero deps; Node 20+ has built-in fetch.
  - option: '**Code generation from bridge-contract.yaml**'
    reason: rejected; the contract is small and stable, manual types are simpler to maintain.
  - option: '**Including client in root package**'
    reason: rejected to keep bridge core lightweight and allow independent versioning.

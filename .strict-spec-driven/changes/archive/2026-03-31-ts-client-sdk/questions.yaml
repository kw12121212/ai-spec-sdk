  - id: >-
      should-packages-client-be-part-of-the-root-bun-workspace-or-fully-standalone-with-its-own-bun-test-command
    question: >-
      Should `packages/client/` be part of the root `bun` workspace, or fully standalone with its
      own `bun test` command?
    context: >-
      A standalone client keeps the client build decoupled from the bridge build, Integration tests
      use `describe.skip`.
    answer: Standalone (own `bun test`). Integration tests are skipped by default and use `describe.skip`.
    status: resolved

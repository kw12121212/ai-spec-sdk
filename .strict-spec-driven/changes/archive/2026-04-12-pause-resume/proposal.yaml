schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: pause-resume
  status: complete
summary:
  what:
    - >-
      为 Bridge 和 Agent 会话添加优雅的暂停和恢复功能。允许客户端在 Agent
      执行过程中暂停会话，保存完整的执行状态（包括当前消息历史、执行状态、上下文等），然后在稍后的时间点从精确的中断点恢复执行。新增 JSON-RPC 方法 `session.pause` 和
      `session.resume`，并完善 `executionState` 状态机以支持 "paused" 状态的转换。
  why:
    - >-
      当前 Agent 会话只能启动、停止或自然完成。在长运行任务、需要人工审核中间结果、或资源受限需要临时释放资源的场景中，暂停/恢复是非常有用的功能： 1.
      **长任务管理**：长时间运行的任务可以暂停以释放资源，稍后继续 2. **人工审核**：Agent 执行过程中可以暂停，让用户检查当前状态后再继续 3.
      **资源调度**：多个会话之间可以分时复用计算资源 4. **状态保存**：暂停时保存的完整状态可以用于调试和分析 此变更建立在已完成的
      agent-state-machine、execution-hooks 和 audit-logging 基础上，是 07-agent-lifecycle 里程碑的关键组成部分。
scope:
  in: []
  out: []
unchanged_behavior:
  - 不使用暂停功能的会话行为完全不变
  - 现有的 `session.start`、`session.stop` 方法行为不变
  - 现有的 `session.resume` 用于恢复中断/完成会话的功能保持不变
  - 状态机中除 "paused" 相关转换外的其他状态转换不变
  - 会话持久化格式的其他字段保持不变

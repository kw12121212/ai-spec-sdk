schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: task-template-registry
approach:
  - >-
    We will introduce a `TaskTemplateStore` class that closely mirrors the existing `TemplateStore`
    used for session templates, but is dedicated to `TaskTemplate` objects. This store will manage
    reading and writing JSON files to a dedicated `task-templates` directory on disk. We will expose
    JSON-RPC endpoints on the bridge to interact with the store.
decisions:
  storage-mechanism:
    decision: >-
      Disk-based JSON storage, chosen to align with the current pattern for session templates and to
      keep external dependencies low.
    rationale: >-
      Disk-based JSON storage, chosen to align with the current pattern for session templates and to
      keep external dependencies low.
  model-structure:
    decision: >-
      The `TaskTemplate` model will include fields such as `name`, `description`, `systemPrompt`,
      `tools`, `parameters` (JSON Schema), and `version`.
    rationale: >-
      The `TaskTemplate` model will include fields such as `name`, `description`, `systemPrompt`,
      `tools`, `parameters` (JSON Schema), and `version`.
alternatives:
  - option: In-Memory Storage
    reason: >-
      Rejected as task templates need to persist across agent restarts to enable scheduled
      workflows.
  - option: External Database (e.g., SQLite, PostgreSQL)
    reason: >-
      Rejected as it introduces heavy external dependencies that are unnecessary for the current SDK
      scope. We stick with the file-based approach currently used in the project.

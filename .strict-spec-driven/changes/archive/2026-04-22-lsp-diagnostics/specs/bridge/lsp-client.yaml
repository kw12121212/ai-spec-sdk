schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: bridge-lsp-client
mapping:
  implementation:
    - src/lsp-client.ts
    - src/lsp-types.ts
    - src/index.ts
  tests:
    - test/lsp-client.test.ts
operations:
  ADDED:
    lsp-diagnostics-storage:
      strength: MUST
      statement: >-
        The system MUST be able to receive and store `textDocument/publishDiagnostics` notifications
        from the connected LSP server.
      scenarios:
        success:
          - GIVEN: an initialized LSP client
          - WHEN: >-
              the server sends a `textDocument/publishDiagnostics` notification containing
              diagnostic items for a specific file URI
          - THEN: the client stores the updated diagnostics for that file URI.
    lsp-diagnostics-retrieval:
      strength: MUST
      statement: >-
        The system MUST provide a method to retrieve the most recent diagnostics for a specific file
        URI.
      scenarios:
        success:
          - GIVEN: an LSP client that has received diagnostics for `file:///path/to/file.ts`
          - WHEN: the `getDiagnostics(uri)` method is called with `file:///path/to/file.ts`
          - THEN: the client returns the stored array of diagnostic items.
  MODIFIED: {}
  REMOVED: {}

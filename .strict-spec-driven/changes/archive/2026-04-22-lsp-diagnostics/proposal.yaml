schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: proposal-lsp-diagnostics
  status: complete
summary:
  what:
    - >-
      Implement diagnostic aggregation and reporting for Language Server Protocol (LSP)
      integrations. This exposes syntax errors, warnings, and hints generated by the connected LSP
      server to the agent.
  why:
    - >-
      This fulfills the final "Done Criteria" for the `11-lsp-mcp-tools.md` milestone: "LSP
      diagnostics are surfaced as agent observations". Without this, the agent is blind to code
      errors that the language server detects, limiting its ability to fix code or understand the
      current state of the workspace.
scope:
  in: []
  out: []
unchanged_behavior:
  - Existing LSP tools (`lsp_hover`, `lsp_definition`, `lsp_references`) remain unchanged.
  - The `LspClient` connection and initialization lifecycle remains unchanged.
  - The unified tool interface remains unchanged.

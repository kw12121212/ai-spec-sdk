schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: proposal-lsp-diagnostics
approach:
  - >-
    **LSP Client State:** Update the `LspClient` class to maintain an internal map of file URIs to
    their most recent diagnostics.
  - >-
    **Notification Handling:** Add a listener for the `textDocument/publishDiagnostics` notification
    in the `LspClient` message handler. When received, update the internal state for the given
    `uri`.
  - >-
    **Tool Implementation:** Add a new `lsp_diagnostics` tool to the `lsp-tools.ts` registry. This
    tool will take a `uri` as an argument and return the current diagnostics for that file.
  - >-
    **Data Structures:** Define appropriate TypeScript interfaces for LSP diagnostics (e.g.,
    `Diagnostic`, `DiagnosticSeverity`, `PublishDiagnosticsParams`) in `src/lsp-types.ts`.
decisions:
  pull-based-retrieval-diagnostics-are-retrieved-by-the-agent:
    decision: >-
      **Pull-Based Retrieval:** Diagnostics are retrieved by the agent on demand via the
      `lsp_diagnostics` tool, rather than pushed asynchronously into the agent's context.
    rationale: This aligns with the existing tool-based interaction model and is simpler to orchestrate.
  state-storage-the-diagnostics-state-is-tied-to-the-lspclient:
    decision: '**State Storage:** The diagnostics state is tied to the `LspClient` instance.'
    rationale: If the client disconnects or restarts, the diagnostics state is reset.
alternatives:
  - option: >-
      **Push-Based Notifications:** We could have implemented a system where diagnostics are
      automatically sent as messages to the agent whenever they change.
    reason: >-
      This was rejected because it introduces asynchronous complexity, potential noise for the
      agent, and breaks the standard request/response tool paradigm.

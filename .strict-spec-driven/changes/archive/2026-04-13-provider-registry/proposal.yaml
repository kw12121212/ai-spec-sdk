schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: proposal-provider-registry
  status: complete
summary:
  what:
    - >-
      Implement a centralized LLM provider registry that manages multiple provider configurations,
      enabling registration, discovery, validation, and lifecycle management of LLM provider
      instances. The registry will:
    - Store and retrieve provider configurations by ID
    - Support registration of multiple providers (Anthropic, OpenAI, local models)
    - Validate provider configurations before registration
    - Provide a default provider mechanism
    - Expose JSON-RPC methods for provider management
    - Integrate with session templates for workspace-scoped defaults
  why:
    - >-
      The completed `provider-interface` change established the foundational `LLMProvider`
      abstraction and the `AnthropicAdapter` implementation. However, there is no system to manage
      multiple provider instances or their configurations. A provider registry is essential because:
      1. **Multi-provider support** is a core goal of milestone 08 (LLM Provider Abstraction Layer)
      2. **Subsequent features depend on it**: provider switching (08), load balancing (08), token
      tracking (08), quota management (08), and provider fallback (08) all require a registry to
      store and access provider configurations 3. **Configuration management** needs a single source
      of truth rather than scattered config objects 4. **Session integration** requires associating
      sessions with specific providers from a managed set Without this registry, the SDK can only
      use a single hardcoded provider, limiting its flexibility and preventing advanced features
      like failover and load distribution.
scope:
  in: []
  out: []
unchanged_behavior:
  - Existing `LLMProvider` interface remains unchanged
  - Existing `AnthropicAdapter` implementation remains unchanged
  - Current single-provider usage pattern continues to work
  - >-
    Session creation and management APIs remain unchanged (sessions will optionally accept a
    provider ID)
  - Workflow execution remains unchanged
  - All existing JSON-RPC methods retain their current behavior
  - Bridge initialization and startup sequence unchanged

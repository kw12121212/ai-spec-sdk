schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: proposal-reasoning-stream
  status: complete
summary:
  what:
    - >-
      Implement support for outputting reasoning/thinking process from the LLM provider as a
      separate stream event, allowing clients to distinguish between final response text and
      intermediate reasoning steps.
  why:
    - >-
      This implements the `reasoning-stream` planned change from the `12-streaming-token.md`
      milestone. With models increasingly supporting "thinking" phases, exposing this stream
      separately is critical for providing transparency into the agent's problem-solving process
      without conflating it with final output intended for the user.
scope:
  in: []
  out: []
unchanged_behavior:
  - Regular response token streaming remains unchanged.
  - >-
    Existing stream control methods (pause, resume, throttle) apply to the entire session stream
    uniformly.

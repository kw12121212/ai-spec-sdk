schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: proposal-reasoning-stream
approach:
  - >-
    Extend the JSON-RPC event payload for streaming tokens to distinguish between standard `text`
    and `reasoning` chunks. For instance, introducing a `type` field or sending a distinct method
    such as `agent.reasoning` vs `agent.token`. We will modify `src/bridge.ts` to handle formatting
    these new events. The LLM provider abstraction in `src/llm-provider/` will be updated to emit
    reasoning chunks where supported by the underlying Anthropic Agent SDK or generic provider
    adapter.
decisions:
  event-separation-emit-reasoning-stream-events-as-a-separate:
    decision: >-
      **Event separation:** Emit reasoning stream events as a separate JSON-RPC notification (e.g.,
      `agent.reasoning`) to ensure backward compatibility for clients that only listen for standard
      output tokens.
    rationale: >-
      **Event separation:** Emit reasoning stream events as a separate JSON-RPC notification (e.g.,
      `agent.reasoning`) to ensure backward compatibility for clients that only listen for standard
      output tokens.
alternatives:
  - option: >-
      Emitting reasoning text as standard text with a special metadata flag: Rejected because it
      forces clients to implement filtering logic to avoid displaying reasoning as final output.
    reason: A distinct event type makes the integration boundary clearer.

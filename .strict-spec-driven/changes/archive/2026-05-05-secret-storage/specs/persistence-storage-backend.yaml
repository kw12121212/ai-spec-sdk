schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: persistence-storage-backend
mapping:
  implementation:
    - src/storage/secret-vault.ts
  tests:
    - test/storage/secret-vault.test.ts
operations:
  ADDED:
    secret-encryption:
      strength: MUST
      statement: Secrets MUST be encrypted at rest.
      scenarios:
        encrypt-on-save:
          - GIVEN: A plaintext secret
          - WHEN: It is saved to the vault
          - THEN: It is encrypted before persistence.
  MODIFIED: {}
  REMOVED: {}

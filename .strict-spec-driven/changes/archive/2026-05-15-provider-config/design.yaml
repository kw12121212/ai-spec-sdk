schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: provider-config
approach:
  - >-
    Extend Go CLI to read ~/.ai-cli/config.json and accept flags (--provider, --base-url) to
    configure LLM providers. Use config.set RPC at startup to pass the config to the bridge.
decisions:
  config.set RPC vs env vars:
    decision: Use config.set RPC to pass provider config from Go CLI to bridge.
    rationale: >-
      Better aligns with existing JSON-RPC bridge extensibility model and avoids relying heavily on
      env vars for dynamic runtime configuration.
alternatives: []
risks: []

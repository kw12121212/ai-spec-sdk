resolved:
  - id: bridge_config_api
    question: >-
      Is config.set RPC already fully supported by the bridge to configure LLM provider registry, or
      do we need to implement it on the TS side?
    context: The planned-change mentions using config.set RPC to configure the provider.
    answer: >-
      Yes, config.set RPC is fully supported. It saves to ConfigStore which the LLM Provider
      Registry reads from the 'llmProviders' key. We just need to implement the Go CLI side to send
      the RPC call.
    status: resolved

schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: proposal-permission-inheritance
approach:
  - >-
    Child sessions will resolve their effective scopes and policies at creation time in
    `session.spawn`.
  - >-
    **Scope Intersection**: If the parent session has `allowedScopes` defined, any requested
    `allowedScopes` in `session.spawn` must be a subset. If the child requests broader scopes, the
    request is rejected with a `-32602` error to prevent privilege escalation. If the child requests
    no specific `allowedScopes`, it defaults to the parent's `allowedScopes`.
  - >-
    **Scope Union**: The child's `blockedScopes` will be the union of the parent's `blockedScopes`
    and any explicitly requested `blockedScopes` in `session.spawn`.
  - >-
    **Policy Inheritance**: Any `policies` active on the parent session will be automatically
    applied to the child session, executing before any policies explicitly requested by the child.
decisions:
  deny-on-escalation:
    decision: >-
      We decided to reject spawn requests that attempt to exceed parent permissions rather than
      silently dropping the exceeding scopes.
    rationale: This ensures the caller is aware their full requested capability set was not granted.
  intersection-over-overrides:
    decision: >-
      A child can only restrict its sandbox further (via subset `allowedScopes` or additional
      `blockedScopes`); it cannot override parent restrictions.
    rationale: >-
      A child can only restrict its sandbox further (via subset `allowedScopes` or additional
      `blockedScopes`); it cannot override parent restrictions.
alternatives:
  - option: Dynamic Resolution
    reason: >-
      We could have child sessions look up their parent's permissions at tool execution time.
      Resolving them at creation time is simpler and avoids complex locking or lookup during the
      critical path of tool execution.
  - option: Silent Restriction
    reason: >-
      We could have silently ignored requested scopes that exceed the parent's scopes. We chose
      explicit rejection (`-32602`) for better developer experience and predictability.

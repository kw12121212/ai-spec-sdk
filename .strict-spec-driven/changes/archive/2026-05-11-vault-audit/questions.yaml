change: vault-audit
open: []
resolved:
  - id: question-audit-sensitive-metadata
    question: >-
      How do we ensure that audit logs do not inadvertently contain sensitive metadata or the
      secrets themselves?
    context: >-
      The milestone risks explicitly mention that audit logs may contain sensitive metadata. We need
      to define exactly what fields are logged.
    status: resolved
    answer: >-
      We will log only the `secretId`, `operation` (read, write, list, delete), and
      `callerContext` (session ID, team ID). The secret value itself will be entirely excluded
      from the audit logs.

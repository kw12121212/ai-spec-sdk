schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: auth-and-authorization
  status: complete
summary:
  what:
    - >-
      Add API key authentication and scope-based authorization to the HTTP transport. Stdio
      transport remains unauthenticated (local process trust model). HTTP transport requires a
      `Bearer` token on all requests except `GET /health`, `bridge.capabilities`, `bridge.ping`, and
      `bridge.negotiateVersion`. A key management CLI (`keygen`, `keys list`, `keys revoke`) allows
      operators to manage keys without editing files.
  why:
    - >-
      The HTTP transport is now live and exposes the bridge over the network. Without
      authentication, any process on the same machine (or network, if the port is externally
      reachable) can issue arbitrary JSON-RPC calls — including starting agent sessions, modifying
      config, or deleting session data. Auth closes this surface before HTTP transport ships to
      production users.
scope:
  in: []
  out: []
unchanged_behavior:
  - Stdio transport behavior is entirely unchanged — no auth, no new flags required for stdio users.
  - All existing JSON-RPC methods, their parameters, and their responses are unchanged.
  - '`GET /health` remains unauthenticated.'
  - '`bridge.capabilities`, `bridge.ping`, `bridge.negotiateVersion` remain callable without a key.'
  - >-
    The `--no-auth` flag preserves the current (no-auth) behavior of the HTTP transport for local
    development.

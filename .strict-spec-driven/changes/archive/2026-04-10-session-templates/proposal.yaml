schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: proposal-session-templates
  status: complete
summary:
  what:
    - >-
      Enable users to save and reuse named session configurations (templates). Templates store
      commonly used session parameters (model, allowedTools, disallowedTools, permissionMode,
      maxTurns, systemPrompt) that can be referenced by name when starting a new session.
  why:
    - >-
      Users frequently start sessions with the same configuration parameters. Without templates,
      they must repeatedly specify the same options (model, tool restrictions, system prompts) for
      each session. This is error-prone and tedious. Templates provide:
    - '**Consistency**: Ensure sessions use validated, pre-approved configurations'
    - '**Efficiency**: Reduce repetitive parameter specification'
    - '**Shareability**: Named configurations can be documented and shared across teams'
scope:
  in: []
  out: []
unchanged_behavior: []

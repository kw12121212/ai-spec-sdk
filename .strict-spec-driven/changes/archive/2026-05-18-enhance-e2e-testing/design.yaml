schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: enhance-e2e-testing
approach:
  - >-
    Create a dedicated E2E test suite in test/e2e that reads a local configuration file
    (e2e-config.json or .env.e2e) to configure a real LLM provider instance, and then executes full
    SDK workflows simulating user inputs and verifying actual model responses.
decisions:
  use-local-config:
    decision: Use local configuration files for real LLM testing.
    rationale: >-
      Allows secure local testing against real models without committing secrets, closely mimicking
      how an end-user configures the CLI/SDK.
alternatives: []
risks: []

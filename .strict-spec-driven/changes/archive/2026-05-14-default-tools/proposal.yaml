schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: default-tools
  status: proposed
summary:
  what:
    - Implement built-in file read/write and shell execution tools
  why:
    - >-
      To provide an out-of-the-box code-editing experience for the lightweight CLI without manual
      MCP setup
scope:
  in:
    - >-
      Built-in filesystem and shell execution tools (read_file, write_file, replace, list_directory,
      run_shell_command) within the TypeScript bridge; tight integration with existing tool approval
      flow; Go CLI automatic enablement.
  out:
    - Re-implementing the core Bridge server in Go; GUI/Web application interfaces.
unchanged_behavior:
  - Existing MCP adapter protocol; JSON-RPC transport.
roadmap:
  milestone: 0017-lightweight-cli
  planned_change: default-tools

change: proposal-agent-session-sdk-wiring
open: []
resolved:
  - id: >-
      if-the-caller-passes-cwd-inside-options-should-the-bridge-reject-with-an-error-or-silently-ignore-it
    question: >-
      If the caller passes `cwd` inside `options`, should the bridge reject with an error or
      silently ignore it?
    context: >-
      `cwd` is bridge-managed (derived from `workspace`). Caller confusion would be silent and hard
      to debug.
    answer: Reject with `-32602`.
    status: resolved
  - id: >-
      when-translating-proxy-params-to-sdk-env-should-bridge-replace-the-entire-env-or-merge-proxy-entries-into-it
    question: >-
      When translating proxy params to SDK `env`, should bridge replace the entire `env` or merge
      proxy entries into it?
    context: Caller may need to pass other env vars alongside proxy settings.
    answer: >-
      Merge — proxy entries overwrite matching keys in caller-provided `options.env`, other keys are
      preserved.
    status: resolved

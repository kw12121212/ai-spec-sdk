schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: proposal-lsp-client
  status: complete
summary:
  what:
    - >-
      Implement a Language Server Protocol (LSP) client. This will enable the system to connect to
      external LSP servers to perform code analysis, completion, and gather diagnostics.
  why:
    - >-
      This change is the foundational step for Milestone 11 "LSP and MCP Tool Integration". By
      implementing an LSP client, we unlock the ability to build advanced code intelligence tools
      (`lsp-tools`) on top of it, significantly expanding the SDK's capabilities.
scope:
  in: []
  out: []
unchanged_behavior:
  - Existing JSON-RPC and WebSocket bridge transports remain unaffected.
  - We will not implement an LSP *server*, only the client.
  - Language-specific AST parsing remains outside the SDK boundary.

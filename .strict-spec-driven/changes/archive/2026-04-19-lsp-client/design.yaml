schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: proposal-lsp-client
approach:
  - >-
    We will build a new client layer that speaks the LSP JSON-RPC protocol over standard I/O to a
    spawned child process. This will likely integrate as a specialized transport or client manager
    within the system, similar to how we manage agent sessions or MCP tools.
decisions:
  the-implementation-will-start-by-spawning-local-language:
    decision: >-
      The implementation will start by spawning local language server binaries using standard
      input/output for JSON-RPC communication.
    rationale: >-
      The implementation will start by spawning local language server binaries using standard
      input/output for JSON-RPC communication.
  the-lsp-client-module-will-abstract-the-raw-json-rpc:
    decision: >-
      The `lsp-client` module will abstract the raw JSON-RPC messages into strongly-typed methods
      corresponding to common LSP endpoints (e.g., `initialize`, `textDocument/didOpen`,
      `textDocument/completion`).
    rationale: >-
      The `lsp-client` module will abstract the raw JSON-RPC messages into strongly-typed methods
      corresponding to common LSP endpoints (e.g., `initialize`, `textDocument/didOpen`,
      `textDocument/completion`).
alternatives:
  - option: '**Direct REST/HTTP Calls:** Not viable as LSP is fundamentally a JSON-RPC protocol.'
    reason: '**Direct REST/HTTP Calls:** Not viable as LSP is fundamentally a JSON-RPC protocol.'
  - option: >-
      **Using a heavyweight generic JSON-RPC library:** Might add unnecessary dependencies; we could
      reuse existing `bridge.ts` JSON-RPC logic if it fits cleanly.
    reason: >-
      **Using a heavyweight generic JSON-RPC library:** Might add unnecessary dependencies; we could
      reuse existing `bridge.ts` JSON-RPC logic if it fits cleanly.

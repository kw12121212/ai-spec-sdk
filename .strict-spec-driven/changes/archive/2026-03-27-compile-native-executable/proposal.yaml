schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: compile-native-executable
  status: complete
summary:
  what:
    - >-
      Add a `build:native` script that uses `bun build --compile` to produce a single self-contained
      native executable (`dist/ai-spec-bridge-native`) from the CLI entry point (`src/cli.ts`). The
      executable bundles all dependencies and requires no Node.js or Bun runtime on the target
      machine.
  why:
    - >-
      The SDK currently ships a JS bundle that requires a Node.js runtime. A native executable
      lowers the distribution bar — users can drop one binary onto a machine without installing any
      runtime, which is especially useful for CI environments and downstream tools embedding the
      bridge.
scope:
  in: []
  out: []
unchanged_behavior:
  - 'Behaviors that must not change as a result of this change:'
  - Existing `build` script (`tsc`) continues to produce `dist/` JS output unchanged
  - '`start` script continues to launch `dist/src/cli.js` unchanged'
  - All existing tests continue to pass
  - The `ai-spec-bridge` npm bin entry continues to resolve to `dist/src/cli.js`

schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: llm-provider-provider-registry
mapping:
  implementation:
    - src/llm-provider/types.ts
    - src/llm-provider/provider-registry.ts
  tests:
    - test/provider-registry.test.ts
operations:
  ADDED:
    provider-token-prediction:
      strength: MUST
      statement: The system MUST support token prediction via provider adapters or fallback heuristics.
      scenarios:
        success-with-provider-api:
          - GIVEN: a provider adapter that implements `predictTokens`
          - WHEN: the registry is asked for a token prediction
          - THEN: the registry MUST return the exact prediction from the provider.
        fallback-heuristic:
          - GIVEN: a provider adapter that does not implement `predictTokens`
          - WHEN: the registry is asked for a token prediction
          - THEN: the registry MUST return a heuristically estimated token count.
  MODIFIED: {}
  REMOVED: {}

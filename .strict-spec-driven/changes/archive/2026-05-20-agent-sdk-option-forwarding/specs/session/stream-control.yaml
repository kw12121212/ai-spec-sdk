schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: session-stream-control
mapping:
  implementation:
    - src/claude-agent-runner.ts
    - src/llm-provider/anthropic-env.ts
  tests:
    - test/claude-agent-runner.test.ts
    - test/anthropic-adapter.test.ts
operations:
  ADDED:
    anthropic-provider-sdk-option-forwarding:
      strength: MUST
      statement: >-
        Anthropic provider-routed sessions MUST preserve Claude Agent SDK runtime options for
        workspace, environment, tools, permission mode, allow and deny tool lists, resume, max
        turns, system prompt, model, and streaming.
      scenarios:
        provider-routed-session-preserves-sdk-options:
          - GIVEN: >-
              a session is routed through a configured Anthropic provider with workspace,
              environment, tool, permission, resume, turn, system prompt, model, and streaming
              controls
          - WHEN: the session starts a Claude Agent SDK query
          - THEN: >-
              the SDK query options include those controls instead of using a plain chat completion
              path
  MODIFIED: {}
  REMOVED: {}

schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: distribution-packaging
approach:
  - >-
    Create an install.sh script that fetches the CLI binaries for the user's OS/Arch. Scaffold a
    basic Homebrew Formula template for macOS/Linux distribution. Modify the Go CLI to locate or
    download the correct version of the TS bridge binary on first run.
decisions:
  install-script-and-brew:
    decision: We will provide an install.sh script and a Homebrew formula.
    rationale: This provides frictionless distribution without requiring Node.js.
alternatives: []
risks: []

schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: build-native-executable
mapping:
  implementation:
    - demo/go-cli/main.go
  tests:
    - test/native-build.test.ts
operations:
  ADDED:
    install-script:
      strength: MUST
      statement: An install.sh script MUST be provided that fetches the CLI binaries for the user's OS/Arch.
      scenarios:
        install-script:
          - GIVEN: A curl or wget command
          - WHEN: running the install.sh script
          - THEN: the appropriate Go CLI binary and native TS bridge binary are installed
  MODIFIED: {}
  REMOVED: {}

schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: proposal-improve-onboarding-and-diagnostics
approach:
  - >-
    Add a shared runtime-info builder that resolves the bridge's current version, transport, auth
    mode, sessions directory, keys file, spec-driven script path, log level, and HTTP settings when
    applicable.
  - >-
    Expose that information through two entrypoints: `bridge.info` for programmatic callers over
    JSON-RPC `ai-spec-bridge doctor` for human operators, with `--json` returning the same core data
    plus diagnostic checks
  - Add CLI help output that documents the supported commands without starting the bridge transport.
  - >-
    Update the capabilities surface and contract docs together so the machine-readable method list,
    README onboarding instructions, and `docs/bridge-contract.yaml` all describe the same public
    API.
  - >-
    Align the published package version with `BRIDGE_VERSION` / `API_VERSION` so release metadata,
    runtime responses, and documentation all report `0.2.0` consistently.
decisions:
  implement-both-bridge-info-and-doctor:
    decision: >-
      `bridge.info` gives integrators a machine-readable discovery method, while `doctor` gives
      operators a local human-readable workflow and a scriptable `--json` mode.
    rationale: >-
      `bridge.info` gives integrators a machine-readable discovery method, while `doctor` gives
      operators a local human-readable workflow and a scriptable `--json` mode.
  keep-diagnostics-read-only:
    decision: >-
      the new entrypoints describe the current runtime state and simple health checks, but they do
      not create keys, rewrite config, or mutate sessions.
    rationale: >-
      the new entrypoints describe the current runtime state and simple health checks, but they do
      not create keys, rewrite config, or mutate sessions.
  require-auth-for-bridge-info-over-authenticated-http:
    decision: >-
      the method exposes local runtime metadata such as resolved filesystem paths, so it should
      follow the admin scope path rather than being treated as a public discovery endpoint.
    rationale: >-
      the method exposes local runtime metadata such as resolved filesystem paths, so it should
      follow the admin scope path rather than being treated as a public discovery endpoint.
  use-one-runtime-info-shape-for-all-entrypoints:
    decision: >-
      `bridge.info` and `doctor --json` should share the same resolved metadata fields so docs and
      tests can describe one contract.
    rationale: >-
      `bridge.info` and `doctor --json` should share the same resolved metadata fields so docs and
      tests can describe one contract.
  treat-docs-alignment-as-a-product-change-not-cleanup:
    decision: >-
      the README and contract file are user-facing parts of the bridge surface, so they are updated
      as first-class deliverables alongside the code.
    rationale: >-
      the README and contract file are user-facing parts of the bridge surface, so they are updated
      as first-class deliverables alongside the code.
alternatives:
  - option: Only add `doctor` and skip `bridge.info`
    reason: rejected because integrators still need a programmatic way to inspect a running bridge.
  - option: Make `bridge.info` public over authenticated HTTP
    reason: >-
      rejected because the response includes host-local runtime metadata that is better protected by
      existing admin auth.
  - option: Only update docs and skip runtime diagnostics
    reason: >-
      rejected because users would still have no built-in way to confirm how a specific process is
      configured.
  - option: Fold diagnostics into `bridge.capabilities`
    reason: >-
      rejected because capabilities are about supported features, while diagnostics are about one
      concrete running instance and its resolved environment.

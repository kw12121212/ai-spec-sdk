schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: bridge-json-rpc-stdio
mapping:
  implementation: []
  tests: []
operations:
  ADDED:
    Session Event Notification Schema:
      strength: MUST
      statement: >-
        The bridge MUST emit `bridge/session_event` notifications with a `type` field whose value is
        one of the defined event types, and MUST include exactly the fields specified for that type.
        Integrators MUST be able to identify any event solely from its `type` field without
        inspecting the `message` sub-object. Defined event types and their required fields: | `type`
        | Additional required fields | |---|---| | `session_started` | `sessionId` | |
        `session_resumed` | `sessionId` | | `session_completed` | `sessionId`, `result` | |
        `session_stopped` | `sessionId`, `status` | | `agent_message` | `sessionId`, `messageType`,
        `message` |
      scenarios:
        notification-carries-the-correct-type-label:
          - GIVEN: a bridge event is emitted during a session lifecycle transition or agent message
          - WHEN: an integrator reads the `bridge/session_event` notification
          - THEN: >-
              the notification contains a `type` field matching one of the defined type values above
              ---
    Agent Message Sub-type Contract:
      strength: MUST
      statement: >-
        The bridge MUST classify each `agent_message` notification with a stable `messageType`
        label. The label MUST correspond to the observable shape of the SDK-emitted message as
        follows: | `messageType` | Observable shape | |---|---| | `system_init` | `type ===
        "system"` AND `subtype === "init"` â€” carries `session_id` and `model` | | `assistant_text` |
        `type === "assistant"` with at least one `"text"` content block AND no `"tool_use"` blocks |
        | `tool_use` | `type === "assistant"` with at least one `"tool_use"` content block (takes
        precedence over `"text"` blocks) â€” carries `name` and `input` | | `tool_result` | `type ===
        "user"` with at least one content block of type `"tool_result"` | | `result` | `type ===
        "result"` â€” carries `subtype` (`"success"` or `"error"`) and `result` | | `other` | Any
        message shape not matching the above â€” forwarded as-is without transformation | The bridge
        MUST inspect content blocks from `message.message.content` when the SDK wraps the message in
        a nested `message` object (standard SDK format), and MUST fall back to `message.content`
        when the content array is at the top level. When an assistant message contains both
        `"tool_use"` and `"text"` content blocks, the bridge MUST classify it as `tool_use`.
      scenarios:
        assistanttext-event-carries-text-content:
          - GIVEN: >-
              the agent emits a message of type `"assistant"` with a text content block and no
              tool_use blocks
          - WHEN: the bridge forwards it as an `agent_message` notification
          - THEN: >-
              the notification has `messageType === "assistant_text"` and the `message` field
              contains the text content block
        tooluse-event-carries-tool-name-and-input:
          - GIVEN: the agent emits a message of type `"assistant"` with a tool_use content block
          - WHEN: the bridge forwards it as an `agent_message` notification
          - THEN: >-
              the notification has `messageType === "tool_use"` and the `message.content` array
              contains a block with the tool `name` and `input`
        tooluse-takes-precedence-over-text-in-mixed-content:
          - GIVEN: >-
              the agent emits a message of type `"assistant"` containing both `"tool_use"` and
              `"text"` content blocks
          - WHEN: the bridge classifies the message
          - THEN: the notification has `messageType === "tool_use"`
        result-event-marks-session-outcome:
          - GIVEN: the agent emits a terminal result message
          - WHEN: the bridge forwards it as an `agent_message` notification
          - THEN: >-
              the notification has `messageType === "result"` and the `message` field includes
              `subtype` and `result`
        unrecognized-message-is-forwarded-as-other:
          - GIVEN: the agent emits a message that does not match any defined shape
          - WHEN: the bridge forwards it as an `agent_message` notification
          - THEN: >-
              the notification has `messageType === "other"` and the full message is forwarded
              without transformation ---
    Session Listing:
      strength: MUST
      statement: >-
        The bridge MUST expose a `session.list` method that returns summaries of sessions known to
        the current bridge process.
      scenarios:
        list-all-sessions:
          - GIVEN: a client calls `session.list` without a `status` filter
          - WHEN: the bridge processes the request
          - THEN: >-
              the response contains a `sessions` array with up to 100 entries, ordered by
              `createdAt` descending, each including: `sessionId`, `status`, `workspace`,
              `createdAt`, `updatedAt`
        filter-by-active-status:
          - GIVEN: 'a client calls `session.list` with `{ "status": "active" }`'
          - WHEN: the bridge processes the request
          - THEN: >-
              the response `sessions` array contains only sessions whose `status` is `"active"`, up
              to 100 entries
        response-is-capped-at-100-entries:
          - GIVEN: more than 100 sessions exist in the bridge process
          - WHEN: the client calls `session.list`
          - THEN: the response contains at most 100 entries (the most recent by `createdAt`)
        unknown-status-filter-is-rejected:
          - GIVEN: a client calls `session.list` with an unrecognized `status` value
          - WHEN: the bridge validates the request
          - THEN: the bridge returns a `-32602` error
  MODIFIED: {}
  REMOVED: {}

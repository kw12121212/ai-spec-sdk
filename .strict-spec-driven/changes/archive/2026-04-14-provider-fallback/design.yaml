schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: provider-fallback
approach:
  - >-
    Extend `ProviderConfig` in `src/llm-provider/types.ts` with `fallbackProviderIds?: string[]`. No
    new class or file is required; all changes live in the existing `ProviderRegistry` and
    `bridge.ts`. **Candidate list construction** in `resolveForSession`:
  - Start with the session's `activeProviderId` (if set and registered)
  - Append `fallbackProviderIds` from the session-active provider's config (if any)
  - Append `defaultProviderId` (if set, not already in list)
  - >-
    Fall back to built-in Claude runner as the terminal fallback Walk this list in order. For each
    candidate, attempt `getOrCreateInstance` + a live query. On error, record `fromProviderId`,
    `toProviderId`, and the error message, emit `provider.fallback.activated` on the bridge event
    bus, then continue to the next candidate. Return the first successful result or throw if all
    candidates fail. **Event emission**: The bridge already has an event system (observable in
    `src/bridge.ts`). Emit `provider.fallback.activated` as a structured notification event using
    the same channel as other bridge events. **New JSON-RPC handler** `provider.getFallbackChain`:
    reads `fallbackProviderIds` from the stored config and returns them. No side effects.
    **Persistence**: `fallbackProviderIds` is a plain field on `ProviderConfig`. The existing
    `saveToStore`/`loadFromStore` already spreads the full config object, so no special handling is
    needed — verified by a round-trip test.
decisions:
  '1':
    decision: '1.'
    rationale: >-
      **Reactive-only trigger**: Fallback fires when a live request throws, not when `healthCheck`
      returns false. This avoids background polling complexity and is consistent with how
      `resolveForSession` already works — it does not pre-check health before routing. 2. **Ordered
      array on the primary provider's config**: The fallback chain is a property of the primary
      provider, not the session. This means one config change propagates to all sessions using that
      provider, without per-session reconfiguration. 3. **Validate fallback IDs at resolve time, not
      registration time**: Requiring all referenced IDs to be registered at registration time would
      impose a strict ordering constraint on clients. Resolve-time validation produces a clear error
      when a chain member is missing, without restricting registration order. 4. **No circuit
      breaker state**: Fallback does not track whether a provider has been failing repeatedly. Each
      request independently walks the chain. Circuit-breaker behavior is deferred to the
      `load-balancer` change.
alternatives:
  - option: Session-level fallback chain
    reason: >-
      A `fallbackProviderIds` on the session instead of the provider config was considered. Rejected
      because it requires each session to independently configure the same chain, and it conflates
      routing policy (which belongs to the provider) with session state.
  - option: Health-check-triggered fallback
    reason: >-
      Proactively routing away from a provider that fails a health check before a live request was
      considered. Deferred to `load-balancer`, which will introduce health polling and
      circuit-breaker concepts. Adding it here would expand scope significantly.
  - option: Wrapping `resolveForSession` at the bridge query dispatch layer
    reason: >-
      Handling fallback at the bridge's query dispatch (rather than inside `resolveForSession`) was
      considered. Rejected because `resolveForSession` is already the canonical resolution point;
      adding fallback there keeps routing logic in one place.

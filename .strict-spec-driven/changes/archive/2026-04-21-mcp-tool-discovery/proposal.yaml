schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: proposal-mcp-tool-discovery
  status: complete
summary:
  what:
    - Add dynamic MCP tool discovery and registration capabilities to the SDK.
  why:
    - >-
      Currently, the SDK connects to an MCP server and can invoke tools, but it relies on external
      discovery or manual registration to know what tools are available. Implementing discovery over
      the MCP protocol (`tools/list`) enables seamless integration and dynamic availability of
      external tools to the agent SDK.
scope:
  in: []
  out: []
unchanged_behavior:
  - Core MCP connection and stdio streaming logic remains unchanged.
  - Execution logic for `tools/call` remains unchanged.
  - Non-MCP tools and other extensions remain unaffected.

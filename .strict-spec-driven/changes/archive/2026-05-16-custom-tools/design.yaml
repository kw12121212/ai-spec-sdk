schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: custom-tools
approach:
  - >-
    Implement tools.register and tools.unregister methods. Store custom tools in
    <workspace>/.claude/custom-tools.json. Merge with built-in tools in the bridge. Execute by
    spawning a shell process, passing input via stdin, and reading output from stdout.
decisions:
  storage-location:
    decision: Store custom tools in .claude/custom-tools.json in the workspace.
    rationale: Provides a workspace-scoped configuration file that is easy to version control.
alternatives: []
risks: []

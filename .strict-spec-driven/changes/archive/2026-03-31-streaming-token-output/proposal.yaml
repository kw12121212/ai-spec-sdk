schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: streaming-token-output
  status: complete
summary:
  what:
    - >-
      Add real-time token-by-token streaming for agent text responses. When a session is started
      with `stream: true`, the bridge emits `stream_chunk` events for each `content_block_delta`
      from the SDK, allowing clients (web UI, TS Client SDK) to render text incrementally instead of
      waiting for the full message.
  why:
    - >-
      **UX impact**: Users staring at a blank chat while the agent generates a long response is a
      poor experience. Streaming lets them see output as it arrives.
    - >-
      **All dependencies are done**: HTTP/SSE transport and TS Client SDK are complete — streaming
      is the missing P0 piece in Phase 6 (v0.7.0).
    - >-
      **Competitive parity**: Every major chat interface streams responses; non-streaming feels
      broken to users.
scope:
  in: []
  out: []
unchanged_behavior:
  - '`stream: false` (default) — identical to current behavior, no changes'
  - '`tool_use` / `tool_result` messages — never streamed, always complete'
  - '`session_completed` — always emitted with full result and usage'
  - >-
    Event buffer and `session.events` — `stream_chunk` events are buffered and replayable like any
    other event

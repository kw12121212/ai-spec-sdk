schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: rate-limiting
  status: complete
summary:
  what:
    - >-
      为 HTTP 传输层添加基于令牌桶算法的按 API Key 限流机制。携带非 `admin` API Key 的 `POST /rpc` 请求默认每分钟最多发起 120 次；超限时返回
      HTTP 429 和 JSON-RPC 错误响应，并附带 `X-RateLimit-*` 响应头。`admin` 范围的 Key 绕过所有限流检查。
  why:
    - >-
      Bridge 已具备 API Key 认证和范围授权（里程碑 02），但缺乏速率保护。没有限流时，单个恶意或失控的客户端可以耗尽 Claude Agent SDK 配额或使 Bridge
      进程过载。在开放自定义工具注册（`custom-tool-registration`）之前，先锁住 HTTP 入口的速率是更安全的顺序。
scope:
  in: []
  out: []
unchanged_behavior:
  - 所有现有认证和授权逻辑不变（`-32061` 和 `-32060` 错误码路径）
  - 现有无需认证的公开方法仍可在不携带 Key 的情况下调用
  - stdio 传输不受任何影响
  - SSE 事件流（`GET /events`）行为不变
  - 未超限的正常请求响应路径不变
  - '`--no-auth` 模式下 Bridge 行为整体不变（仅额外跳过限流）'

schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: add-polyglot-agent-spec-bridge
approach:
  - >-
    Build the first version of the SDK as a local bridge process that speaks JSON-RPC 2.0 over
    stdio. A host tool starts the bridge as a subprocess, sends structured requests, and receives
    structured responses plus notifications for streaming progress. The bridge exposes a small
    high-level surface instead of mirroring every low-level primitive. One part of the surface
    manages Claude-backed agent sessions for prompt execution and session resumption. Another part
    manages spec-driven workflows so a host can invoke supported change-management operations
    without manually orchestrating skill files, scaffold scripts, or artifact paths. Every request
    is bound to an explicit workspace path so host tools can decide which repository or project
    context they are operating on. Long-running operations emit notifications keyed by request or
    session identifiers so clients can render progress incrementally while still receiving a final
    terminal result.
decisions:
  use-json-rpc-2-0-over-stdio-first-so-the-bridge-is-easy-to:
    decision: >-
      Use JSON-RPC 2.0 over stdio first so the bridge is easy to adopt from IDEs, CLIs, and agent
      hosts without requiring network deployment.
    rationale: >-
      Use JSON-RPC 2.0 over stdio first so the bridge is easy to adopt from IDEs, CLIs, and agent
      hosts without requiring network deployment.
  expose-high-level-workflow-operations-instead-of-raw-skill:
    decision: >-
      Expose high-level workflow operations instead of raw skill prompt passthrough so the SDK
      contract stays stable even if the packaged skill internals evolve.
    rationale: >-
      Expose high-level workflow operations instead of raw skill prompt passthrough so the SDK
      contract stays stable even if the packaged skill internals evolve.
  include-session-lifecycle-apis-in-the-first-release-because:
    decision: >-
      Include session lifecycle APIs in the first release because most integrators need both
      structured workflow automation and direct Claude agent execution.
    rationale: >-
      Include session lifecycle APIs in the first release because most integrators need both
      structured workflow automation and direct Claude agent execution.
  require-explicit-workspace-targeting-for-workflow-and:
    decision: >-
      Require explicit workspace targeting for workflow and session requests so repository
      boundaries are controlled by the caller rather than hidden global state.
    rationale: >-
      Require explicit workspace targeting for workflow and session requests so repository
      boundaries are controlled by the caller rather than hidden global state.
  support-streaming-notifications-for-long-running-session-and:
    decision: >-
      Support streaming notifications for long-running session and workflow activity so downstream
      tools can render progress without polling.
    rationale: >-
      Support streaming notifications for long-running session and workflow activity so downstream
      tools can render progress without polling.
  package-built-in-spec-driven-skills-as-part-of-the-sdk:
    decision: >-
      Package built-in spec-driven skills as part of the SDK distribution and expose skill discovery
      metadata for hosts that want to present supported capabilities.
    rationale: >-
      Package built-in spec-driven skills as part of the SDK distribution and expose skill discovery
      metadata for hosts that want to present supported capabilities.
alternatives:
  - option: HTTP API first
    reason: >-
      rejected for the initial change because it adds deployment, port management, and security
      concerns before validating the local integration contract.
  - option: CLI-only wrapper
    reason: >-
      rejected because parsing human-oriented command output would make downstream integrations more
      brittle than a structured protocol.
  - option: Full Claude Agent SDK passthrough
    reason: >-
      rejected because it would leak too much underlying complexity and reduce the value of the
      wrapper for non-Node tools.
  - option: Workflow-only bridge
    reason: >-
      rejected because integrators would still need a second path for general Claude agent sessions,
      which weakens the value of a unified SDK.

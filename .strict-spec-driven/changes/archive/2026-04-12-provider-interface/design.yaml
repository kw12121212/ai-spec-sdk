change: provider-interface
approach:
  - 采用**适配器模式（Adapter Pattern）**实现 LLM 提供商抽象层。核心设计思路：
  - '**定义统一接口**：创建 `LLMProvider` TypeScript 接口，规定所有提供商必须实现的方法'
  - '**实现 Anthropic 适配器**：将现有的 `runClaudeQuery` 逻辑封装为 `AnthropicAdapter` 类，实现 `LLMProvider` 接口'
  - '**配置驱动**：通过 `ProviderConfig` 类型定义配置模式，支持运行时参数化'
  - '**能力发现**：每个适配器声明自身支持的能力，便于上层逻辑做特性检测'
  - >-
    **生命周期管理**：提供初始化、健康检查、销毁的标准方法 ### 核心类型定义 ```typescript // src/llm-provider/types.ts export
    interface ProviderConfig { id: string; type: "anthropic" | "openai" | "local"; // 可扩展 apiKey?:
    string; model?: string; temperature?: number; maxTokens?: number; [key: string]: unknown; //
    提供商特定参数 } export interface ProviderCapabilities { streaming: boolean; tokenUsageTracking:
    boolean; functionCalling: boolean; maxContextLength?: number; supportedModels: string[]; }
    export interface TokenUsage { inputTokens: number; outputTokens: number; } export interface
    QueryMessage { role: "user" | "assistant" | "system"; content: string; } export interface
    QueryOptions { messages: QueryMessage[]; stream?: boolean; temperature?: number; maxTokens?:
    number; stopSequences?: string[]; [key: string]: unknown; } export interface StreamEvent { type:
    "text_delta" | "usage_delta" | "complete" | "error"; data: unknown; } export interface
    LLMProvider { readonly id: string; readonly config: ProviderConfig; initialize(): Promise<void>;
    healthCheck(): Promise<boolean>; getCapabilities(): ProviderCapabilities; query(options:
    QueryOptions): Promise<QueryResult>; queryStream(options: QueryOptions, onEvent: (event:
    StreamEvent) => void, signal?: AbortSignal): Promise<QueryResult>; destroy(): void; } export
    interface QueryResult { status: "completed" | "stopped"; result: unknown; usage: TokenUsage |
    null; } ``` ### 文件结构 ``` src/ llm-provider/ types.ts # 接口和类型定义 index.ts # 导出入口 adapters/
    anthropic.ts # Anthropic 适配器实现 ``` ### 集成点
    [claude-agent-runner.ts](src/claude-agent-runner.ts)：重构为使用 `LLMProvider` 接口而非直接调用 SDK
    [session-store.ts](src/session-store.ts)：Session 对象增加可选的 `providerId` 字段 测试文件通过
    `globalThis.__AI_SPEC_SDK_QUERY__` 注入 stub（保持现有模式）

schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: security-permission-scopes
mapping:
  implementation:
    - src/permission-scopes.ts
    - src/permission-policy.ts
    - src/bridge.ts
    - src/capabilities.ts
    - src/session-store.ts
    - src/template-store.ts
    - src/role-store.ts
  tests:
    - test/permission-scopes.test.ts
    - test/permission-policy.test.ts
    - test/bridge.test.ts
    - test/role-store.test.ts
operations:
  ADDED:
    Role Definitions:
      strength: MUST
      statement: >-
        The system MUST define roles in a static configuration file `roles.yaml` located in the
        workspace or system configuration directory. The file MUST map role names to arrays of scope
        strings. If `roles.yaml` is missing or malformed, the system MUST default to an empty set of
        roles.
      scenarios:
        role-resolution:
          - GIVEN: '`roles.yaml` defines a role `developer` with scopes `["file:read", "file:write"]`'
          - WHEN: the `developer` role is resolved
          - THEN: the resulting scopes are `["file:read", "file:write"]`
    Role Parameters on Session Creation:
      strength: MUST
      statement: >-
        The system MUST accept an optional `roles` (array of role string identifiers) parameter in
        addition to `allowedScopes` and `blockedScopes` for `session.start`, `session.spawn`, and
        `session.resume` methods. The effective allowed scopes for the session MUST be the union of
        `allowedScopes` and the scopes granted by the specified `roles`. Invalid role strings MUST
        be rejected with a `-32602` error.
      scenarios:
        session-start-with-roles:
          - GIVEN: >-
              a client calls `session.start` with `roles: ["developer"]` where `developer` grants
              `["file:read", "file:write"]`
          - WHEN: the session is created
          - THEN: the session stores the role configuration
          - AND: tools requiring `file:read` or `file:write` scopes are permitted
  MODIFIED: {}
  REMOVED: {}

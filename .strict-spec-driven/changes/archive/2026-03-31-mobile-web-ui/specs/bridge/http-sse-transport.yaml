schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: bridge-http-sse-transport
mapping:
  implementation: []
  tests: []
operations:
  ADDED:
    Static UI File Serving:
      strength: MUST
      statement: >-
        When the bridge is running in HTTP mode, it MUST serve `src/ui/index.html` for `GET /`
        requests. The file MUST be served with `Content-Type: text/html; charset=utf-8`. This
        serving behavior MUST be controlled by the `AI_SPEC_SDK_UI_ENABLED` environment variable.
        When unset or set to any value other than `"false"`, the UI MUST be served. When set to
        `"false"`, `GET /` MUST return HTTP 404. Requests for `GET /` MUST NOT require
        authentication (the UI itself is public; authentication happens when the UI makes API
        calls).
      scenarios:
        ui-file-served-at-root-path:
          - GIVEN: the bridge is running in HTTP mode with UI enabled
          - WHEN: a client requests `GET /`
          - THEN: >-
              the bridge returns the content of `src/ui/index.html` with `Content-Type: text/html;
              charset=utf-8` and HTTP 200
        ui-disabled-via-env-var:
          - GIVEN: '`AI_SPEC_SDK_UI_ENABLED` is set to `"false"`'
          - WHEN: a client requests `GET /`
          - THEN: the bridge returns HTTP 404
        ui-path-does-not-conflict-with-api:
          - GIVEN: the bridge is serving the UI at `GET /`
          - WHEN: a client requests `POST /rpc`, `GET /events`, or `GET /health`
          - THEN: those endpoints continue to function normally without interference from the UI serving
  MODIFIED: {}
  REMOVED: {}

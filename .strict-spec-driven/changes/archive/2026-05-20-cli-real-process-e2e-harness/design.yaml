schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: cli-real-process-e2e-harness
approach:
  - >-
    Add shared E2E helpers that resolve the compiled CLI entrypoint, create disposable execution
    roots, and launch the CLI via PTY or pipes depending on the assertion surface. Keep
    live-provider configuration local-only and ignored by default, and document separate
    deterministic vs opt-in live commands without enabling live tests in normal bun run test.
decisions:
  separate-harness-from-scenarios:
    decision: Build reusable real-process harness utilities before adding matrix or live-agent scenarios.
    rationale: >-
      This is the only dependency-free roadmap item in milestone 0020 and it unblocks both
      downstream planned changes while keeping the deterministic harness reusable.
alternatives: []
risks: []

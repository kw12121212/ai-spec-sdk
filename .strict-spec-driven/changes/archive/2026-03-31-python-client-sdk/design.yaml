schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: python-client-sdk
approach:
  - >-
    ### Package Structure ``` clients/python/ ├── pyproject.toml ├── src/ai_spec_sdk/ │ ├──
    __init__.py # Public API exports │ ├── client.py # BridgeClient (unified API) │ ├── transports/
    │ │ ├── __init__.py │ │ ├── base.py # Transport abstract base class │ │ ├── stdio.py #
    StdioTransport (wraps claude-agent-sdk) │ │ └── http.py # HttpTransport (POST /rpc + GET /events
    SSE) │ ├── types.py # Typed request/response dataclasses │ ├── events.py # Event listener
    registry │ └── errors.py # Custom exceptions └── tests/ ├── test_client.py ├──
    test_stdio_transport.py ├── test_http_transport.py └── test_types.py ``` ### Transport
    Abstraction ```python class Transport(ABC): @abstractmethod async def connect(self) -> None: ...
    @abstractmethod async def disconnect(self) -> None: ... @abstractmethod async def request(self,
    method: str, params: dict) -> Any: ... @abstractmethod def on_event(self, callback: Callable) ->
    None: ... ``` ### StdioTransport Wraps `claude-agent-sdk`'s `ClaudeSDKClient`:
  - >-
    `session.start` → spawns Claude CLI via `ClaudeSDKClient.connect(prompt=...)` with
    `ClaudeAgentOptions` mapped from request params
  - '`session.resume` → `ClaudeSDKClient.query(prompt=..., session_id=..., resume=True)`'
  - '`session.stop` → `ClaudeSDKClient.interrupt()`'
  - Streaming → `receive_messages()` yields typed events, mapped to `session_event` callbacks
  - >-
    Agent control params map to `ClaudeAgentOptions` fields: `model`, `allowed_tools`,
    `disallowed_tools`, `permission_mode`, `max_turns`, `system_prompt`
  - Custom tools via `@tool` decorator passed to `ClaudeAgentOptions(tools=...)`
  - Hooks via `ClaudeAgentOptions(hooks=...)`
  - >-
    Only supports session lifecycle methods; raises `UnsupportedInStdioError` for bridge-only
    methods ### HttpTransport Connects to bridge via HTTP/SSE:
  - JSON-RPC 2.0 over `POST /rpc` using Python stdlib `http.client`
  - SSE event stream via `GET /events` with manual SSE parsing (no external dependency)
  - Bearer token auth from constructor parameter
  - Reconnection with exponential backoff (1s → 2s → 4s → ... → 30s cap)
  - >-
    Supports all bridge methods ### BridgeClient Method names use **camelCase** to match the TS
    Client SDK (`sessionStart`, `sessionResume`, etc.). `sessionStart` and `sessionResume` return
    immediately with a result/session ID. Agent output is delivered asynchronously via
    `on("session_event", handler)` callbacks. This matches the bridge's behavior and supports
    concurrent sessions. ```python class BridgeClient: def __init__( self, transport:
    Literal["stdio", "http"] = "stdio", # HTTP options host: str = "localhost", port: int = 8765,
    api_key: str | None = None, # Stdio options bridge_path: str | None = None, workspace: str |
    None = None, **kwargs, ): ... async def __aenter__(self) -> "BridgeClient": ... async def
    __aexit__(self, *exc) -> None: ... # Event listener def on(self, event: str, callback: Callable)
    -> None: ... # Session methods (both transports) async def sessionStart(self, **params) -> dict:
    ... async def sessionResume(self, **params) -> dict: ... async def sessionStop(self, sessionId:
    str) -> dict: ... # Bridge-only methods (HTTP only, raise UnsupportedInStdioError in stdio)
    async def sessionStatus(self, **params) -> dict: ... async def sessionList(self, **params) ->
    dict: ... async def sessionHistory(self, **params) -> dict: ... async def sessionSearch(self,
    **params) -> dict: ... async def sessionBranch(self, **params) -> dict: ... async def
    sessionExport(self, **params) -> dict: ... async def sessionDelete(self, **params) -> dict: ...
    async def sessionCleanup(self, **params) -> dict: ... async def sessionEvents(self, **params) ->
    dict: ... async def sessionApproveTool(self, **params) -> dict: ... async def
    sessionRejectTool(self, **params) -> dict: ... async def configGet(self, **params) -> dict: ...
    async def configSet(self, **params) -> dict: ... async def configList(self, **params) -> dict:
    ... async def toolsList(self) -> dict: ... async def modelsList(self) -> dict: ... async def
    workspaceRegister(self, **params) -> dict: ... async def workspaceList(self) -> dict: ... async
    def bridgeCapabilities(self) -> dict: ... async def bridgePing(self) -> dict: ... async def
    bridgeInfo(self) -> dict: ... async def bridgeSetLogLevel(self, **params) -> dict: ... async def
    bridgeNegotiateVersion(self, **params) -> dict: ... async def mcpAdd(self, **params) -> dict:
    ... async def mcpRemove(self, **params) -> dict: ... async def mcpStart(self, **params) -> dict:
    ... async def mcpStop(self, **params) -> dict: ... async def mcpList(self, **params) -> dict:
    ... async def hooksAdd(self, **params) -> dict: ... async def hooksRemove(self, **params) ->
    dict: ... async def hooksList(self, **params) -> dict: ... async def contextRead(self, **params)
    -> dict: ... async def contextWrite(self, **params) -> dict: ... async def contextList(self,
    **params) -> dict: ... async def workflowRun(self, **params) -> dict: ... async def
    skillsList(self) -> dict: ... ``` ### Dependency Strategy
  - '**Required**: `claude-agent-sdk` (for stdio transport)'
  - '**No extra deps for HTTP**: uses Python stdlib `http.client` and manual SSE parsing'
  - '**Dev**: `pytest`, `pytest-asyncio` for testing'
decisions:
  '1':
    decision: '1.'
    rationale: >-
      **Wrap claude-agent-sdk, don't reimplement** — the official SDK handles CLI subprocess
      lifecycle, message protocol, and types correctly; wrapping avoids divergence 2. **Async only**
      — `claude-agent-sdk` is async-only; providing a sync API would require a separate event loop
      thread and add complexity for no real benefit 3. **Stdio features are a subset** — stdio mode
      only supports session lifecycle + streaming + tool control; bridge-only features (persistence,
      search, config, MCP lifecycle) require HTTP mode 4. **Graceful degradation** — calling an
      unsupported method in stdio mode raises a clear `UnsupportedInStdioError` with a message
      suggesting HTTP transport 5. **Zero HTTP dependencies** — Python stdlib is sufficient for HTTP
      + SSE; no need for `httpx` or `aiohttp` 6. **Method names use camelCase** — matches the TS
      Client SDK (`sessionStart`, `sessionList`, etc.) for API consistency across languages
alternatives:
  - option: '1.'
    reason: >-
      **Pure bridge HTTP client (no claude-agent-sdk)** — simpler but loses stdio mode and direct
      CLI access; rejected because users want local-first capability 2. **httpx for HTTP transport**
      — more ergonomic but adds an external dependency; rejected because stdlib is sufficient for
      JSON-RPC + SSE 3. **Sync + async dual API** — doubles the API surface; rejected because
      claude-agent-sdk is async-only and Python 3.10+ users are comfortable with async 4.
      **Subprocess bridge + JSON-RPC for stdio** — spawn bridge process instead of using
      claude-agent-sdk; rejected because claude-agent-sdk already handles this correctly and adds
      features (custom tools, hooks)

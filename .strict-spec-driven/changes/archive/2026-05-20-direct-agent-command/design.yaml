schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: direct-agent-command
approach:
  - >-
    Extend src/cli.ts (or add src/agent-command.ts) to register an 'agent' command with a 'run'
    alias. Parse CLI flags with the existing yargs setup. Build an AgentRunOptions object from
    parsed flags and dispatch through the existing bridge session path. Render bridge notifications
    as human-readable terminal output; switch to JSON lines when --json is passed. Reuse
    anthropic-env.ts for the provider env-mapping logic already validated in
    agent-sdk-option-forwarding.
decisions:
  D1:
    decision: Extend existing CLI binary rather than a separate entrypoint
    rationale: >-
      Keeps distribution simple (one binary), reuses existing flag-parsing infrastructure, and
      avoids duplicating the bridge-launch flow
alternatives: []
risks: []

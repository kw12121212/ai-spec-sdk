schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: bridge-json-rpc-stdio
mapping:
  implementation: []
  tests: []
operations:
  ADDED:
    bridge.ping health-check method:
      strength: MUST
      statement: >-
        The Bridge MUST respond to `bridge.ping` with `{pong: true, ts: <ISO-8601 string>}`.
        `bridge.capabilities` methods list MUST include `"bridge.ping"` and `"session.events"`.
      scenarios: {}
    session.events missed-event replay:
      strength: MUST
      statement: >-
        The Bridge MUST expose a `session.events` method that returns buffered
        `bridge/session_event` notifications for a given session. Request parameters: `{sessionId:
        string, since?: number, limit?: number}`. `since` is a non-negative integer; only events
        with `seq >= since` are returned (default 0). `limit` is a positive integer; max events
        returned (default 50, cap 500). Response: `{sessionId: string, events: Event[], total:
        number}` where each event includes a `seq` field (0-based per-session counter). If the
        session is unknown, the Bridge MUST return error code `-32011`. The event buffer is
        in-memory only; it is not persisted to disk and is cleared on Bridge restart. The buffer
        holds at most 500 events per session; oldest events are dropped when the cap is reached.
      scenarios: {}
  MODIFIED: {}
  REMOVED: {}

schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: gui-important-gaps
  status: complete
summary:
  what:
    - >-
      Add three capabilities to the Bridge that unblock important GUI quality features: 1.
      **`bridge.ping`** — health-check RPC method. 2. **`session.events`** — missed-event replay:
      returns buffered session events with a `since` cursor. 3. **Token usage** — propagate `usage`
      (input_tokens / output_tokens) from the SDK result message into `session_completed`
      notifications and `session.start`/`session.resume` responses.
  why:
    - >-
      GUI clients need to know if the Bridge process is alive (ping), need to recover events after a
      reconnect (event replay), and need token counts to show cost/usage dashboards. These three
      gaps were identified in the GUI integrator analysis (TODO.md items 3, 4, 6).
scope:
  in: []
  out: []
unchanged_behavior:
  - >-
    All existing RPC methods (`session.start`, `session.resume`, `session.stop`, `session.status`,
    `session.list`, `session.history`, `workflow.run`, `skills.list`, `bridge.capabilities`)
    continue to work identically.
  - Session disk persistence is unchanged.
  - Proxy forwarding is unchanged.
  - Existing error codes and validation rules are unchanged.
  - '`session.history` (history of prompts/messages) is not replaced by `session.events`.'

schema: strict-spec-driven/task-list/v2
schema_version: 2
artifact_type: task_list
schema_file: templates/strict-spec-driven/schemas/task-list.yaml
change: provider-switching
sections:
  Implementation:
    implementation-1:
      text: >-
        Extend `SessionStore` session record schema with `activeProviderId?: string` field, ensure
        it is persisted and restored on load
      status: complete
    implementation-2:
      text: >-
        Add `resolveForSession(sessionId: string): Promise<LLMProvider>` method to
        `ProviderRegistry` with fallback chain: session override → registry default → built-in
        Anthropic
      status: complete
    implementation-3:
      text: >-
        Add `switchSessionProvider(sessionId, targetProviderId)` method to `ProviderRegistry` with
        validation (exists + health check) and before/after return value
      status: complete
    implementation-4:
      text: >-
        Add `provider.switch` JSON-RPC handler in `bridge.ts` with full validation chain (session
        exists, switchable state, provider registered, healthy) and notification emission
      status: complete
    implementation-5:
      text: >-
        Add `session.setProvider` JSON-RPC handler in `bridge.ts` delegating to the same core
        switching logic
      status: complete
    implementation-6:
      text: >-
        Integrate provider resolution into `runClaudeQuery` in `claude-agent-runner.ts` — accept
        optional `providerId`, route to `LLMProvider.query()`/`queryStream()` when provided
      status: complete
    implementation-7:
      text: >-
        Wire session's `activeProviderId` into query launch path in bridge so that `session.start`
        and `session.resume` resolve and pass the effective provider to the runner
      status: complete
    implementation-8:
      text: Include `activeProviderId` in `session.status` response and `session.list` entries
      status: complete
    implementation-9:
      text: Add `"provider.switch"` and `"session.setProvider"` to `bridge.capabilities` methods array
      status: complete
    implementation-10:
      text: Define new error code `-32004` ("Provider unhealthy") in error constants
      status: complete
  Testing:
    testing-1:
      text: Run `bun run lint` (tsc --noEmit) and fix any type errors
      status: complete
      command: bun run lint
    testing-2:
      text: Run `bun run test` and ensure all existing tests still pass (no regressions)
      status: complete
      command: bun run test
    testing-3:
      text: >-
        Write unit tests in `test/provider-switching.test.ts` covering: - `resolveForSession`
        fallback chain (session override, registry default, built-in fallback) - `resolveForSession`
        graceful degradation when override provider is removed or unhealthy -
        `switchSessionProvider` success cases (idle, paused, running sessions) -
        `switchSessionProvider` rejection cases (unknown session, non-switchable state, unknown
        provider, unhealthy provider) - Idempotent switch to same provider
      status: complete
      command: test/provider-switching.test.ts
    testing-4:
      text: >-
        Write integration tests in `test/provider-switching-bridge.test.ts` covering: -
        `provider.switch` JSON-RPC round-trip (valid request, all error codes) -
        `session.setProvider` JSON-RPC round-trip (identical behavior to `provider.switch`) -
        `bridge/provider_switched` notification emission with correct payload - `activeProviderId`
        appears in `session.status` and `session.list` - Capabilities include new methods - Switch
        takes effect on next query turn (provider used after switch matches target)
      status: complete
      command: test/provider-switching-bridge.test.ts
  Verification:
    verification-1:
      text: Verify implementation matches proposal scope (no out-of-scope features added)
      status: complete
    verification-2:
      text: Verify all delta spec scenarios have corresponding test coverage
      status: complete
    verification-3:
      text: 'Verify backward compatibility: sessions without `activeProviderId` work exactly as before'
      status: complete
testing_gates:
  validation_task: testing-1
  unit_test_task: testing-2

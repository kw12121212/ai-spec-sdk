schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: bridge-lsp-tools
mapping:
  implementation:
    - src/lsp-tools.ts
    - src/index.ts
  tests:
    - test/lsp-tools.test.ts
operations:
  ADDED:
    lsp-hover-tool:
      strength: MUST
      statement: >-
        The system MUST provide an `lsp_hover` tool that retrieves hover information for a specific
        position in a file.
      scenarios:
        success:
          - GIVEN: an active `LspClient` connection
          - WHEN: the agent calls `lsp_hover` with a valid file URI, line, and character
          - THEN: >-
              the system sends a `textDocument/hover` request to the language server and returns the
              formatted response
    lsp-definition-tool:
      strength: MUST
      statement: The system MUST provide an `lsp_definition` tool that locates the definition of a symbol.
      scenarios:
        success:
          - GIVEN: an active `LspClient` connection
          - WHEN: the agent calls `lsp_definition` with a valid file URI, line, and character
          - THEN: >-
              the system sends a `textDocument/definition` request to the language server and
              returns the resolved location(s)
    lsp-references-tool:
      strength: MUST
      statement: The system MUST provide an `lsp_references` tool that finds all references to a symbol.
      scenarios:
        success:
          - GIVEN: an active `LspClient` connection
          - WHEN: the agent calls `lsp_references` with a valid file URI, line, and character
          - THEN: >-
              the system sends a `textDocument/references` request to the language server and
              returns the list of reference locations
  MODIFIED: {}
  REMOVED: {}

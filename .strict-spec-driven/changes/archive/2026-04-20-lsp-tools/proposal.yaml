schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: proposal-lsp-tools
  status: complete
summary:
  what:
    - >-
      Expose Language Server Protocol (LSP) capabilities (hover, definition, and references) as
      Claude Agent SDK tools using the existing `LspClient` integration.
  why:
    - >-
      Agents need semantic code understanding to be effective. The LSP client connection was
      established in the `lsp-client` milestone, but without tools exposing those capabilities, the
      agent cannot actually query code intelligence. Adding these specific tools bridges that gap.
scope:
  in: []
  out: []
unchanged_behavior:
  - The core `LspClient` connection logic and process lifecycle management remains unchanged.
  - The overall bridge architecture and agent session behavior remain unchanged.

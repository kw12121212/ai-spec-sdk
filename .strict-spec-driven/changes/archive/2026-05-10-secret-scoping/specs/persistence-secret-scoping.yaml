schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: persistence-secret-scoping
mapping:
  implementation:
    - src/storage/secret-store.ts
  tests:
    - test/storage/secret-store.test.ts
operations:
  ADDED:
    req-scope:
      strength: MUST
      statement: The secret store MUST restrict access based on the provided scope.
      scenarios:
        access-denied:
          - GIVEN: a secret scoped to 'team-a'
          - WHEN: accessed with scope 'team-b'
          - THEN: access is denied
  MODIFIED: {}
  REMOVED: {}

schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: tool-result-cache
approach:
  - >-
    Implement a caching layer in the tool execution pipeline, utilizing the cache store interfaces
    introduced for LLM response caching. Add a deterministic flag to tool definitions.
decisions:
  opt-in-caching:
    decision: Tools must explicitly opt-in to caching via a deterministic flag.
    rationale: Prevents accidental caching of tools with side effects.
alternatives: []
risks: []

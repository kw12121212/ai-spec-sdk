schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: proposal-multi-channel-delivery
  status: complete
summary:
  what:
    - >-
      Implement multi-channel delivery for the Question Resolution Protocol by extending the
      existing webhook infrastructure to deliver `session_question` events to subscribed webhooks,
      and introducing a generic HTTP Push mechanism.
  why:
    - >-
      Agents need to be able to pause and ask human users questions asynchronously. Delivering these
      structured questions via webhooks and generic push mechanisms ensures that downstream
      integrations (like mobile clients or chat platforms) receive the question promptly, enabling
      human-in-the-loop workflows.
scope:
  in: []
  out: []
unchanged_behavior:
  - >-
    Existing session lifecycle webhook events (`session_started`, `session_completed`, etc.) remain
    unchanged.
  - The structured payload format defined in `question-payload` remains intact.
  - Authentication, HMAC-SHA256 signing, and retry policies for webhooks are not modified.

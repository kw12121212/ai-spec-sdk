schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: custom-tool-registration
  status: complete
summary:
  what:
    - >-
      为 Bridge 添加工作区作用域的自定义工具注册功能。允许客户端通过 `tools.register` 方法注册 shell-command 类型的自定义工具，通过
      `tools.unregister` 方法注销，并通过 `tools.list` 查看合并后的工具列表（内置工具 +
      当前工作区的自定义工具）。自定义工具仅对注册时指定的工作区可见，不同工作区的自定义工具相互隔离。
  why:
    - >-
      当前 Bridge 仅支持固定的内置工具集（Bash、Read、Write
      等）。实际使用场景中，用户经常需要针对特定项目定义重复使用的命令行操作（如运行特定测试脚本、构建命令、代码检查工具等）。将这些命令注册为自定义工具后： 1. Agent
      可以直接调用这些工具，无需通过 Bash 工具手动输入长命令 2. 工具调用可以被权限系统管控（配合 `allowedTools`/`disallowedTools`） 3.
      项目特定的知识（命令参数、工作目录等）被封装在工具定义中 在开放自定义工具注册之前，`rate-limiting` 已为 HTTP 入口添加了速率保护，这是正确的安全顺序。
scope:
  in: []
  out: []
unchanged_behavior:
  - 不指定 `workspace` 时，`tools.list` 行为与之前一致（仅返回内置工具）
  - 内置工具的名称、描述、行为完全不变
  - 未使用自定义工具的会话行为不变
  - '`allowedTools`/`disallowedTools` 中引用内置工具的方式不变'
  - stdio 传输和 HTTP 传输的工具调用流程不变
  - hooks 系统的 `pre_tool_use` 事件触发逻辑不变

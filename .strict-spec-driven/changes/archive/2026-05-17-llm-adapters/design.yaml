schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: llm-adapters
approach:
  - >-
    Create new adapter classes in src/llm-provider/adapters/ implementing the internal provider
    interface. The OpenAI adapter maps our messages and tools to OpenAI's function calling API,
    while the DeepSeek adapter handles DeepSeek's specific endpoints.
decisions:
  ADAPTER_ARCHITECTURE:
    decision: Use separate class adapters for OpenAI and DeepSeek instead of a single configurable one.
    rationale: Provides better isolation for provider-specific API quirks and simplifies testing.
alternatives: []
risks: []

schema: strict-spec-driven/change-design/v1
schema_version: 1
artifact_type: change_design
schema_file: templates/strict-spec-driven/schemas/change-design.yaml
change: proposal-contract-type-generation
approach:
  - >-
    ### Generator Architecture The type generator will be a TypeScript Node.js script
    (`scripts/generate-types.ts`) that:
  - '**Parse Phase**: Load and parse `docs/bridge-contract.yaml` using a YAML parser'
  - >-
    **Extract Phase**: Walk the contract structure to collect type definitions: Method params and
    results from `methods.*.params` and `methods.*.result` Notification payloads from
    `envelope.notification.params` Error data structures from `error_codes.*.data` Enum values from
    `enum` fields
  - >-
    **Transform Phase**: Convert contract types to target language types: Contract `type: string` →
    TypeScript `string` / Python `str` Contract `type: number` → TypeScript `number` / Python `int |
    float` Contract `type: boolean` → TypeScript `boolean` / Python `bool` Contract `type: array` →
    TypeScript array / Python `list[T]` Contract `type: object` with `fields` → TypeScript interface
    / Python `@dataclass` Contract `enum` → TypeScript union of literals / Python `Literal[...]`
    Contract `nullable: true` → TypeScript union with `null` / Python `| None`
  - >-
    **Generate Phase**: Write formatted output files with generated headers ### File Structure ```
    scripts/ generate-types.ts # Main generator entry point lib/ contract-parser.ts # YAML parsing
    and contract extraction ts-generator.ts # TypeScript code generation py-generator.ts # Python
    code generation type-mappings.ts # Contract-to-language type mappings ``` ### Generated File
    Headers Both output files will include auto-generated warnings: **TypeScript
    (`packages/client/src/types.ts`)**: ```typescript // AUTO-GENERATED from bridge-contract.yaml //
    Do not edit manually. Run `bun run generate:types` to regenerate. // Generated at: <timestamp>
    ``` **Python (`clients/python/src/ai_spec_sdk/types.py`)**: ```python # AUTO-GENERATED from
    bridge-contract.yaml # Do not edit manually. Run type generator to regenerate. # Generated at:
    <timestamp> ``` ### Backward Compatibility Strategy Preserve existing export names where
    semantics match Add deprecated aliases for any renamed types Keep hand-written utility types (if
    any) in separate files
decisions:
  '1':
    decision: '1.'
    rationale: '**Use TypeScript for the generator** (not Python):'
  the-main-project-is-typescript-keeps-tooling-consistent:
    decision: The main project is TypeScript; keeps tooling consistent
    rationale: The main project is TypeScript; keeps tooling consistent
  easier-to-share-type-definitions-between-generator-and:
    decision: Easier to share type definitions between generator and runtime
    rationale: Easier to share type definitions between generator and runtime
  single-language-for-build-pipeline-2:
    decision: Single language for build pipeline 2.
    rationale: '**Generate both languages from the same parse**:'
  ensures-consistency-between-typescript-and-python-types:
    decision: Ensures consistency between TypeScript and Python types
    rationale: Ensures consistency between TypeScript and Python types
  single-source-of-truth-in-the-contract-file-3:
    decision: Single source of truth in the contract file 3.
    rationale: '**Preserve existing file paths**:'
  typescript:
    decision: TypeScript
    rationale: '`packages/client/src/types.ts`'
  python:
    decision: Python
    rationale: '`clients/python/src/ai_spec_sdk/types.py`'
  maintains-backward-compatibility-with-existing-imports-4:
    decision: Maintains backward compatibility with existing imports 4.
    rationale: '**No runtime validation**:'
  this-change-is-purely-for-static-type-checking:
    decision: This change is purely for static type checking
    rationale: This change is purely for static type checking
  runtime-validation-can-be-added-later-if-needed:
    decision: Runtime validation can be added later if needed
    rationale: Runtime validation can be added later if needed
alternatives:
  - option: '1.'
    reason: '**JSON Schema as intermediate format**:'
  - option: Ruled out
    reason: Adds complexity without benefit; YAML is already structured
  - option: Would require maintaining schema-to-type converters 2.
    reason: '**Separate generators per language**:'
  - option: Ruled out
    reason: Risk of divergence between TypeScript and Python types
  - option: Unified generator ensures consistency 3.
    reason: '**Template-based generation (Handlebars, EJS)**:'
  - option: Ruled out
    reason: String concatenation is sufficient for this use case
  - option: Templates add dependency without significant readability benefit 4.
    reason: '**Python-based generator**:'
  - option: Ruled out
    reason: Would require Python in the build pipeline
  - option: TypeScript generator can be run with `bun`/`node` already in use
    reason: TypeScript generator can be run with `bun`/`node` already in use

target_spec: bridge-json-rpc-stdio
mapping:
  implementation: []
  tests: []
operations:
  ADDED: {}
  MODIFIED:
    Session History Method in Capabilities:
      strength: MUST
      statement: >-
        The bridge capability response MUST advertise `session.history` as a supported method so
        clients can discover it without trial and error.
      scenarios:
        capabilities-include-session-history:
          - GIVEN: a client calls `bridge.capabilities`
          - WHEN: the bridge returns its capability metadata
          - THEN: the response identifies `session.history` as a supported method

schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: proposal-structured-logging
  status: complete
summary:
  what:
    - >-
      Introduce a unified, structured logging system that outputs JSON lines to stderr with
      configurable log levels and session-scoped context. Replace all ad-hoc error handling with
      consistent log calls across the bridge and its sub-modules.
  why:
    - >-
      The bridge currently has no observability — errors in dispatch, session lifecycle, MCP server
      management, and workflow execution are silently swallowed or only surfaced as JSON-RPC error
      responses.
    - >-
      Upcoming roadmap features (session persistence, HTTP/SSE transport, auth) depend on structured
      logging for debugging and audit trails.
    - >-
      JSON lines to stderr keeps stdout clean for JSON-RPC while giving operators machine-readable
      logs for `tee`, `systemd`, or log aggregation.
scope:
  in: []
  out: []
unchanged_behavior:
  - JSON-RPC request/response on stdout is unaffected
  - All existing methods, error codes, and notification schemas remain identical
  - No external dependencies added
  - >-
    No changes to session persistence format or bridge capabilities (except the new
    `bridge.setLogLevel` method)

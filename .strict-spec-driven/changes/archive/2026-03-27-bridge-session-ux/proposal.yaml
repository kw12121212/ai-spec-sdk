schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: bridge-session-ux
  status: complete
summary:
  what:
    - >-
      Add four UX-oriented features to the bridge to bring the SDK closer to a complete Claude Code
      CLI experience: 1. **Context management** — `context.read`, `context.write`, `context.list`
      methods for reading and writing CLAUDE.md files, memory files, and `.claude/` directory
      contents across workspace and user scopes. 2. **File change tracking** — `bridge/file_changed`
      notifications emitted when the agent uses Write or Edit tools, carrying path, action, and
      optional diff. 3. **Session branching** — `session.branch` method that forks a new session
      from a point in an existing session's history, attempting SDK-level resume when possible. 4.
      **Cross-session search** — `session.search` method for searching across session histories with
      workspace, status, and text filters.
  why:
    - 'GUI clients built on the SDK currently lack the ability to:'
    - Manage the context the agent sees (CLAUDE.md, memory files) without manual file access
    - Track which files an agent modifies in real time
    - Explore alternate conversation paths from a mid-session checkpoint
    - >-
      Find relevant past conversations across sessions These capabilities are standard in the Claude
      Code CLI and are needed by any downstream GUI or tool that wants to offer a comparable
      experience.
scope:
  in: []
  out: []
unchanged_behavior:
  - All existing bridge methods continue to work identically
  - Session store, MCP store, config store, hooks store are unchanged
  - >-
    `bridge/session_event` notification format and types are unchanged (file changes use a separate
    notification method)
  - Agent control parameters, tool approval flow, and proxy handling are unaffected

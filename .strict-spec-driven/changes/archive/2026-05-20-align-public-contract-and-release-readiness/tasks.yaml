schema: strict-spec-driven/task-list/v2
schema_version: 2
artifact_type: task_list
schema_file: templates/strict-spec-driven/schemas/task-list.yaml
change: align-public-contract-and-release-readiness
sections:
  Implementation:
    audit-public-surfaces:
      text: >-
        Audit bridge dispatch methods, capabilities methods, auth scope mappings,
        docs/bridge-contract.yaml, README.md, docs/roadmap.md, and release scripts for drift.
      status: complete
    align-capabilities:
      text: >-
        Update runtime capability discovery so bridge.capabilities advertises every callable
        JSON-RPC method handled by bridge dispatch.
      status: complete
    repair-bridge-contract:
      text: >-
        Update docs/bridge-contract.yaml so the public contract covers the current method set,
        transports, auth scopes, notifications, errors, and environment variables without stale
        duplicate sections.
      status: complete
    add-drift-checks:
      text: >-
        Add automated checks that fail when dispatch methods, capabilities methods, auth scope
        mappings, or bridge contract method coverage drift apart.
      status: complete
    refresh-docs:
      text: >-
        Update README.md and docs/roadmap.md to describe the implemented SDK surface and separate
        completed capabilities from remaining future hardening.
      status: complete
    add-release-readiness:
      text: >-
        Add or document deterministic release-readiness commands covering lint, tests, build,
        TypeScript client build, and native build smoke coverage where practical.
      status: complete
  Testing:
    run-lint:
      text: Run TypeScript validation.
      status: complete
      command: bun run lint
    run-build:
      text: Run build validation.
      status: complete
      command: bun run build
    run-tests:
      text: Run the full Bun test suite.
      status: complete
      command: bun run test
    run-client-build:
      text: Build the TypeScript client package.
      status: complete
      command: cd packages/client && bun run build
  Verification:
    verify-scope:
      text: Verify implementation matches proposal scope.
      status: complete
    verify-contract-drift:
      text: >-
        Confirm the new drift checks fail on intentional metadata omissions and pass on the final
        method set.
      status: complete
    verify-release-readiness:
      text: >-
        Confirm release-readiness documentation and commands do not require live LLM credentials or
        Python packaging tools by default.
      status: complete
testing_gates:
  validation_task: run-lint
  unit_test_task: run-tests

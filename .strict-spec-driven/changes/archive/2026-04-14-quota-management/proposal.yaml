schema: strict-spec-driven/change-proposal/v1
schema_version: 1
artifact_type: change_proposal
schema_file: templates/strict-spec-driven/schemas/change-proposal.yaml
change:
  id: quota-management
  status: complete
summary:
  what:
    - >-
      Implement a quota management system that enforces configurable token usage limits across
      multiple scopes (session, provider, global) with pluggable enforcement actions (warn, block,
      or both). The system integrates with the existing `TokenStore` and `TokenRecord`
      infrastructure to check quotas in real time before and after each LLM query, exposing quota
      state and violation events through JSON-RPC methods and bridge notifications.
  why:
    - >-
      The existing `token-tracking` change (Milestone 08, complete) provides comprehensive recording
      and aggregation of token usage per session, per message, and per provider — but there is no
      mechanism to enforce limits on that usage. Without quota management:
    - >-
      Unbounded token consumption can lead to unexpected API costs, especially with multiple
      sessions or long-running agents.
    - Multi-tenant or shared deployments have no way to isolate or cap per-session/provider usage.
    - >-
      Downstream integrators (GUI clients, CI pipelines) lack a programmatic signal when usage
      approaches or exceeds limits. Quota management is the natural next step after token tracking:
      it consumes the same aggregated data and adds policy-based guardrails, directly supporting the
      Milestone 08 done criterion: *"Quota limits are enforced with configurable actions
      (warn/block)."*
scope:
  in: []
  out: []
unchanged_behavior:
  - >-
    Existing `token.*` methods (`getSessionSummary`, `getMessageUsage`, `getProviderUsage`, etc.)
    MUST continue to work without any behavioral change
  - Existing `provider.*` methods MUST remain unaffected
  - >-
    Session lifecycle (start, resume, pause, stop, destroy) MUST NOT change its current behavior or
    state transitions
  - Queries that do not trigger any quota rule MUST execute exactly as they do today
  - >-
    The `TokenStore.record()` method and `TokenRecord` data model are read-only from the quota
    system's perspective — no mutation of stored records

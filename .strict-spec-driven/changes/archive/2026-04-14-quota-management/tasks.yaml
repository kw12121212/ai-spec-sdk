schema: strict-spec-driven/task-list/v2
schema_version: 2
artifact_type: task_list
schema_file: templates/strict-spec-driven/schemas/task-list.yaml
change: quota-management
sections:
  Implementation:
    implementation-1:
      text: >-
        Create `src/quota/types.ts` — define `QuotaScope`, `QuotaRule`, `QuotaStatus`,
        `QuotaViolation`, and validation functions
      status: complete
    implementation-2:
      text: >-
        Create `src/quota/registry.ts` — implement in-memory `QuotaRegistry` class with
        set/get/list/remove/clear methods; include session-scoped cleanup helper
      status: complete
    implementation-3:
      text: >-
        Create `src/quota/enforcer.ts` — implement `QuotaEnforcer` with `preQueryCheck(sessionId,
        providerId)` and `postQueryCheck(sessionId, providerId)` methods; integrate with TokenStore
        as read-only consumer
      status: complete
    implementation-4:
      text: >-
        Wire quota enforcement into `src/claude-agent-runner.ts` — call enforcer.preQueryCheck
        before each query; short-circuit on block; call enforcer.postQueryCheck after token
        recording
      status: complete
    implementation-5:
      text: >-
        Register `quota.*` JSON-RPC method handlers in `src/bridge.ts` — quota.set, quota.get,
        quota.list, quota.remove, quota.clear, quota.getStatus, quota.getViolations
      status: complete
    implementation-6:
      text: >-
        Add session-scoped quota cleanup to `src/session-store.ts` — call registry.removeBySession
        on session destroy
      status: complete
    implementation-7:
      text: >-
        Advertise quota methods in `src/capabilities.ts` — add all quota.* methods to capabilities
        response
      status: complete
    implementation-8:
      text: Export new modules from `src/index.ts` if needed for test access
      status: complete
  Testing:
    testing-1:
      text: Run `bun run lint` (tsc --noEmit) and fix any type errors
      status: complete
      command: bun run lint
    testing-2:
      text: >-
        Create `test/quota/registry.test.ts` — unit tests for QuotaRegistry CRUD: set valid/invalid
        rules, duplicate rejection, get existing/non-existent, list filtering, remove, clear,
        session-scoped cleanup
      status: complete
      command: test/quota/registry.test.ts
    testing-3:
      text: >-
        Create `test/quota/enforcer.test.ts` — unit tests for QuotaEnforcer: preQueryCheck
        allow/block/warn scenarios, postQueryCheck warn detection, scope-to-TokenStore mapping
        correctness, warnThreshold percentage calculation
      status: complete
      command: test/quota/enforcer.test.ts
    testing-4:
      text: >-
        Create `test/quota/bridge-methods.test.ts` — tests for JSON-RPC method routing: parameter
        validation, error codes (-32060, -32061, -32602), response shapes for all 7 methods
      status: complete
      command: test/quota/bridge-methods.test.ts
    testing-5:
      text: >-
        Create `test/quota/integration.test.ts` — integration tests using stubbed TokenStore: full
        flow from quota.set → query trigger → enforcement → notification emission → violation
        recording → quota.remove on session destroy
      status: complete
      command: test/quota/integration.test.ts
  Verification:
    verification-1:
      text: Verify all spec requirements have corresponding test coverage
      status: complete
    verification-2:
      text: Verify no regression in existing token-tracking or provider-registry behavior
      status: complete
    verification-3:
      text: Verify bridge.capabilities includes all new quota.* methods
      status: complete
    verification-4:
      text: Verify error code -32060 does not collide with existing error codes
      status: complete
testing_gates:
  validation_task: testing-1
  unit_test_task: testing-2

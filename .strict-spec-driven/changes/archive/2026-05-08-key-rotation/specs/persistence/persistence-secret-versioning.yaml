schema: strict-spec-driven/delta-spec/v1
schema_version: 1
artifact_type: delta_spec
schema_file: templates/strict-spec-driven/schemas/delta-spec.yaml
target_spec: persistence-secret-versioning
mapping:
  implementation:
    - src/storage/index.ts
  tests:
    - test/storage/index.test.ts
operations:
  ADDED:
    rotation-grace-period:
      strength: MUST
      statement: >-
        The system MUST support a grace period during which multiple versions of a rotated secret
        are considered active.
      scenarios:
        multiple-active-keys:
          - GIVEN: A secret has been automatically rotated and is within its grace period
          - WHEN: A request validates using either the new or the previous secret version
          - THEN: The validation MUST succeed
  MODIFIED: {}
  REMOVED: {}

schema: strict-spec-driven/main-spec/v1
schema_version: 1
artifact_type: main_spec
schema_file: templates/strict-spec-driven/schemas/main-spec.yaml
spec:
  id: build-sdk-packaging
  title: SDK Packaging
mapping:
  implementation:
    - package.json
    - scripts/release-check.sh
    - scripts/check.sh
    - scripts/build.sh
    - packages/client/package.json
  tests:
    - test/cli.test.ts
    - test/native-build.test.ts
    - packages/client/test/integration.test.ts
requirements:
  build:pack script exists:
    strength: MUST
    statement: The project MUST expose a `build:pack` script in the root `package.json`.
    scenarios: {}
  build:pack produces a TypeScript client tgz:
    strength: MUST
    statement: >-
      Running `build:pack` MUST produce an npm-installable `.tgz` artifact for the
      `@ai-spec-sdk/client` package (via `npm pack` in `packages/client/`).
    scenarios: {}
  build:pack produces a Python client wheel:
    strength: MUST
    statement: >-
      Running `build:pack` MUST produce a Python-installable `.whl` artifact for the `ai-spec-sdk`
      package (via `python -m build --wheel` in `clients/python/`), output to
      `clients/python/dist/`.
    scenarios: {}
  artifacts are installable locally without a registry:
    strength: MUST
    statement: >-
      The `.tgz` artifact MUST be installable with `npm install ./path/to/artifact.tgz`. The `.whl`
      artifact MUST be installable with `pip install ./path/to/artifact.whl`. No registry access is
      required.
    scenarios: {}
  release-readiness-checks-are-runnable:
    strength: MUST
    statement: >-
      The project MUST provide deterministic release-readiness checks that can be run locally before
      publishing without requiring live LLM provider credentials.
    scenarios:
      release-check-command:
        - GIVEN: a developer is preparing a release
        - WHEN: the documented release-readiness checks are run
        - THEN: >-
            lint, tests, build, TypeScript client build, and native build smoke coverage are
            executed or explicitly reported as unavailable
  package-versions-are-consistent:
    strength: SHOULD
    statement: >-
      Release-readiness validation SHOULD check that documented package versions and exported
      bridge/API versions are consistent across root, TypeScript client, and contract metadata where
      those versions are intended to match.
    scenarios:
      version-drift:
        - GIVEN: a package or public API version changes
        - WHEN: release-readiness validation runs
        - THEN: unexpected version drift is reported before publishing
  real-provider-smoke-is-optional:
    strength: SHOULD
    statement: >-
      Live LLM provider smoke tests SHOULD remain optional and must not be required for the default
      deterministic release check.
    scenarios:
      no-credentials:
        - GIVEN: no real provider API keys are present
        - WHEN: default release-readiness validation runs
        - THEN: >-
            the validation can still complete using stubs or by skipping only explicitly optional
            live-provider smoke tests
  python-release-checks-out-of-scope:
    strength: MUST
    statement: >-
      Default release-readiness validation for this change MUST NOT require Python client tests,
      Python wheel builds, or Python platform publishing tools.
    scenarios:
      no-python-tooling:
        - GIVEN: Python packaging tools are not installed locally
        - WHEN: default release-readiness validation runs
        - THEN: the validation does not fail because Python package checks were omitted

schema: strict-spec-driven/main-spec/v1
schema_version: 1
artifact_type: main_spec
schema_file: templates/strict-spec-driven/schemas/main-spec.yaml
spec:
  id: session-delivery-tracking
  title: Delivery Tracking
mapping:
  implementation:
    - src/delivery-tracker.ts
  tests:
    - test/delivery-tracker.test.ts
requirements:
  req-track-delivery-status:
    strength: MUST
    statement: >-
      The system MUST track the delivery status (pending, delivered, failed) and attempt count of
      each emitted question.
    scenarios:
      initial-pending:
        - GIVEN: an agent pauses and emits a question
        - WHEN: the delivery tracker accepts the question
        - THEN: the initial delivery status MUST be pending with an attempt count of 0
  req-retry-on-failure:
    strength: MUST
    statement: >-
      The system MUST retry question delivery upon transient failure using exponential backoff up to
      a maximum of 3 attempts.
    scenarios:
      retry-transient-failure:
        - GIVEN: a pending question in the delivery tracker
        - WHEN: a delivery attempt fails
        - THEN: >-
            the attempt count MUST increment and the status MUST update to failed (or pending if
            retrying)
        - AND: a retry MUST be scheduled after the backoff interval
  req-terminal-failure:
    strength: MUST
    statement: >-
      The system MUST mark a delivery as permanently failed once the maximum retry attempts are
      exhausted.
    scenarios:
      exhausted-retries:
        - GIVEN: a question delivery has failed 3 times
        - WHEN: the final delivery attempt fails
        - THEN: the status MUST be permanently marked as failed
        - AND: no further retries MUST be scheduled
  req-escalation-timeout:
    strength: MUST
    statement: >-
      The system MUST support an optional escalation policy (timeoutMs and fallbackAction) for
      questions.
    scenarios:
      escalation-provided:
        - GIVEN: an agent asks a question with an escalation policy
        - WHEN: the question is stored
        - THEN: the escalation policy MUST be tracked along with the pending question
  req-escalation-enforcement-cron:
    strength: MUST
    statement: The system MUST use a background cron job to periodically evaluate pending question timeouts.
    scenarios:
      cron-evaluates-timeout:
        - GIVEN: a pending question with a timeout
        - WHEN: the cron scheduler runs and the current time exceeds the timeout
        - THEN: the question MUST be escalated according to its fallback action
  req-escalation-action-abort:
    strength: MUST
    statement: The system MUST abort the session if a question times out with the 'abort' fallback action.
    scenarios:
      timeout-abort:
        - GIVEN: a pending question whose timeout has expired with an 'abort' action
        - WHEN: the escalation is triggered
        - THEN: the session MUST be aborted and the question marked as escalated
  req-escalation-action-continue:
    strength: MUST
    statement: >-
      The system MUST resume the session with a default answer if a question times out with the
      'continue' fallback action.
    scenarios:
      timeout-continue:
        - GIVEN: a pending question whose timeout has expired with a 'continue' action
        - WHEN: the escalation is triggered
        - THEN: >-
            the session MUST resume with the predefined default answer and the question marked as
            escalated

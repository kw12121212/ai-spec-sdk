schema: strict-spec-driven/main-spec/v1
schema_version: 1
artifact_type: main_spec
schema_file: templates/strict-spec-driven/schemas/main-spec.yaml
spec:
  id: cli-terminal-ux
  title: CLI Terminal UX
mapping:
  implementation:
    - src/cli.ts
    - src/agent-cli.ts
  tests:
    - test/agent-cli.test.ts
requirements:
  req-1:
    strength: MUST
    statement: >-
      The Go CLI must render markdown content using rich terminal formatting with
      charmbracelet/glamour.
    scenarios:
      sc-1:
        - GIVEN: The CLI receives markdown text
        - WHEN: It outputs the text to the terminal
        - THEN: It is formatted with ANSI colors and markdown styles
  stream-render:
    strength: MUST
    statement: >-
      The CLI renderer MUST progressively render text chunks as they arrive via bridge/stream_chunk
      notifications
    scenarios:
      stream-arrival:
        - GIVEN: a streaming session
        - WHEN: bridge/stream_chunk is received
        - THEN: the text is rendered immediately
  agent-command-registration:
    strength: MUST
    statement: >-
      The CLI MUST expose an 'agent' command that accepts a prompt argument and workspace, model,
      permission-mode, allow-tool, deny-tool, max-turns, system-prompt, template, timeout, stream,
      and --json output flags.
    scenarios:
      agent-command-invocation:
        - GIVEN: A user runs ai-spec-bridge agent --workspace /repo 'fix the bug'
        - WHEN: The CLI parses the command
        - THEN: >-
            It dispatches a coding-agent session with the parsed workspace and prompt and renders
            session notifications to the terminal
  agent-json-output:
    strength: MUST
    statement: >-
      When invoked with --json, the CLI MUST emit machine-readable JSON-lines for each bridge
      notification and the final session result instead of human-readable terminal output.
    scenarios:
      json-output-mode:
        - GIVEN: A user runs ai-spec-bridge agent --json --workspace /repo 'fix the bug'
        - WHEN: The CLI dispatches the session and receives notifications
        - THEN: >-
            Each notification is emitted as a JSON-lines object and the final result is a JSON-lines
            object with the session outcome

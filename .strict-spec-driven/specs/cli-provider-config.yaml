schema: strict-spec-driven/main-spec/v1
schema_version: 1
artifact_type: main_spec
schema_file: templates/strict-spec-driven/schemas/main-spec.yaml
spec:
  id: cli-provider-config
  title: CLI Provider Configuration
mapping:
  implementation:
    - src/llm-provider/anthropic-env.ts
    - src/llm-provider/provider-registry.ts
    - src/claude-agent-runner.ts
    - src/llm-provider/index.ts
    - src/llm-provider/types.ts
    - src/llm-provider/adapters/openai.ts
    - src/llm-provider/adapters/deepseek.ts
    - src/llm-provider/balancer-registry.ts
    - src/llm-provider/load-balancer.ts
  tests:
    - test/provider-registry.test.ts
    - test/claude-agent-runner.test.ts
    - test/balancer-registry.test.ts
    - test/llm-provider.test.ts
    - test/load-balancer.test.ts
    - test/load-balancer-bridge.test.ts
    - test/provider-fallback.test.ts
    - test/provider-registry-bridge.test.ts
    - test/provider-switching.test.ts
    - test/provider-switching-bridge.test.ts
    - test/llm-provider/adapters/deepseek.test.ts
    - test/llm-provider/adapters/openai.test.ts
    - test/e2e/config-loader.ts
    - test/e2e/llm-provider.e2e.test.ts
requirements:
  CLI_PROVIDER_CONFIG:
    strength: MUST
    statement: The Go CLI MUST read provider configuration from ~/.ai-cli/config.json and command-line flags.
    scenarios:
      User provides CLI flags for provider:
        - GIVEN: The user runs the CLI with --provider openai and --base-url http://localhost:11434/v1
        - WHEN: The CLI initializes the bridge
        - THEN: The CLI MUST send a config.set RPC request configuring the LLM provider registry.
  LLM_ADAPTERS:
    strength: MUST
    statement: The system MUST support OpenAI and DeepSeek as LLM providers.
    scenarios:
      OpenAI Adapter Mapping:
        - GIVEN: A user configures the OpenAI provider
        - WHEN: A completion request is made
        - THEN: >-
            The adapter MUST correctly map internal tool calling format to OpenAI's function calling
            API.
  agent-command-provider-flags:
    strength: MUST
    statement: >-
      The agent command MUST accept --base-url, --api-key, --auth-token, and repeatable --sdk-env
      KEY=VALUE flags and forward them to the session dispatch path through the existing
      anthropic-env mapping.
    scenarios:
      provider-flags-forwarding:
        - GIVEN: >-
            A user runs ai-spec-bridge agent --base-url https://api.example.com --api-key sk-123
            --workspace /repo 'task'
        - WHEN: The CLI builds the session options
        - THEN: >-
            ANTHROPIC_BASE_URL and ANTHROPIC_API_KEY are set in the Agent SDK environment and passed
            to the session dispatch
  anthropic-compatible-sdk-env:
    strength: MUST
    statement: >-
      Anthropic provider configuration MUST map API key, auth token, base URL aliases, and provider
      SDK environment entries into Claude Agent SDK environment options for Anthropic-compatible
      endpoints.
    scenarios:
      provider-config-maps-sdk-env:
        - GIVEN: >-
            an Anthropic-compatible provider is configured with base URL, API key or auth token, and
            SDK environment values
        - WHEN: a provider-routed Claude Agent SDK query is started
        - THEN: >-
            the SDK query environment contains ANTHROPIC_BASE_URL, ANTHROPIC_API_KEY or
            ANTHROPIC_AUTH_TOKEN, and the configured SDK environment values
  local-live-e2e-provider-config:
    strength: MUST
    statement: >-
      Opt-in live CLI E2E tests MUST read provider credentials from a local-only configuration
      contract that is ignored by default and skipped with a clear reason when it is absent.
    scenarios:
      missing-live-config-skip:
        - GIVEN: >-
            A developer runs the documented live CLI E2E command without local provider
            configuration.
        - WHEN: The E2E config loader checks for live-provider settings.
        - THEN: >-
            The live suite skips with a clear reason instead of failing the default deterministic
            test flow.

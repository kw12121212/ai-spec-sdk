schema: strict-spec-driven/main-spec/v1
schema_version: 1
artifact_type: main_spec
schema_file: templates/strict-spec-driven/schemas/main-spec.yaml
spec:
  id: cli-provider-config
  title: CLI Provider Configuration
mapping:
  implementation:
    - src/llm-provider/anthropic-env.ts
    - src/llm-provider/provider-registry.ts
    - src/claude-agent-runner.ts
  tests:
    - test/provider-registry.test.ts
    - test/claude-agent-runner.test.ts
requirements:
  CLI_PROVIDER_CONFIG:
    strength: MUST
    statement: The Go CLI MUST read provider configuration from ~/.ai-cli/config.json and command-line flags.
    scenarios:
      User provides CLI flags for provider:
        - GIVEN: The user runs the CLI with --provider openai and --base-url http://localhost:11434/v1
        - WHEN: The CLI initializes the bridge
        - THEN: The CLI MUST send a config.set RPC request configuring the LLM provider registry.
  LLM_ADAPTERS:
    strength: MUST
    statement: The system MUST support OpenAI and DeepSeek as LLM providers.
    scenarios:
      OpenAI Adapter Mapping:
        - GIVEN: A user configures the OpenAI provider
        - WHEN: A completion request is made
        - THEN: >-
            The adapter MUST correctly map internal tool calling format to OpenAI's function calling
            API.

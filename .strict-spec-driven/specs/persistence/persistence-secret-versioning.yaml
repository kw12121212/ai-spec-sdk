schema: strict-spec-driven/main-spec/v1
schema_version: 1
artifact_type: main_spec
schema_file: templates/strict-spec-driven/schemas/main-spec.yaml
spec:
  id: persistence-secret-versioning
  title: Secret Versioning
mapping:
  implementation: []
  tests: []
requirements:
  secret-version-history:
    strength: MUST
    statement: >-
      The system MUST allow storing multiple versions of a secret under the same identifier and
      track which version is active.
    scenarios:
      version-creation:
        - GIVEN: A secret exists with version 1
        - WHEN: A new value is saved for the secret
        - THEN: The system creates version 2 and marks it as active
  rotation-grace-period:
    strength: MUST
    statement: >-
      The system MUST support a grace period during which multiple versions of a rotated secret are
      considered active.
    scenarios:
      multiple-active-keys:
        - GIVEN: A secret has been automatically rotated and is within its grace period
        - WHEN: A request validates using either the new or the previous secret version
        - THEN: The validation MUST succeed

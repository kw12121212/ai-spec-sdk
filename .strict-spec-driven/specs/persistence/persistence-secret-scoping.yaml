spec:
  id: persistence-secret-scoping
  title: Secret Scoping
mapping:
  implementation:
    - src/storage/secret-store.ts
  tests:
    - test/storage/secret-store.test.ts
requirements:
  req-scope:
    strength: MUST
    statement: The secret store MUST restrict access based on the provided scope.
    scenarios:
      access-denied:
        - GIVEN: a secret scoped to 'team-a'
        - WHEN: accessed with scope 'team-b'
        - THEN: access is denied
